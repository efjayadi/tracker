<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YEN BANGUNAN - Tracker Pesanan</title>
  
  <!-- 0. PWA Meta Tags & Manifest (TEMA PUTIH) -->
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="YEN Tracker">
  <link rel="apple-touch-icon" href="./icon-192.png">
  <link rel="manifest" href="./manifest.json">

  <!-- 1. Service Worker Registration & Global PWA Catcher -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./service-worker.js')
          .then(registration => {
            console.log('ServiceWorker terdaftar dengan scope: ', registration.scope);
          })
          .catch(err => {
            console.log('ServiceWorker gagal mendaftar: ', err);
          });
      });
    }

    // GLOBAL PWA PROMPT CATCHER (Menangkap event sebelum React me-render)
    window.deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      window.deferredPrompt = e;
      // Beritahu React bahwa PWA siap
      window.dispatchEvent(new Event('pwa-ready'));
    });
  </script>

  <!-- 2. Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 3. Tailwind Configuration -->
  <script>
    window.tailwind = {
      config: {
        darkMode: 'class', 
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            },
            animation: {
              'wave': 'wave 20s ease-in-out infinite alternate',
              'wave-slow': 'wave 25s ease-in-out infinite alternate-reverse',
              'slide-down': 'slide-down 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
              'truck-drive': 'truck-drive 0.2s linear infinite',
              'wind-1': 'wind-flow 0.4s linear infinite',
              'wind-2': 'wind-flow 0.4s linear infinite 0.1s',
              'wind-3': 'wind-flow 0.4s linear infinite 0.2s',
              'package-jitter': 'package-jitter 0.5s ease-in-out infinite',
              'hourglass-flip': 'hourglass-flip 2s ease-in-out infinite',
              'question-pulse': 'question-pulse 1.5s ease-in-out infinite',
            },
            keyframes: {
              wave: {
                '0%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1) rotate(5deg)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9) rotate(-5deg)' },
                '100%': { transform: 'translate(0px, 0px) scale(1) rotate(0deg)' }
              },
              'slide-down': {
                '0%': { transform: 'translateY(-150%)', opacity: '0' },
                '100%': { transform: 'translateY(0)', opacity: '1' }
              },
              'truck-drive': {
                '0%, 100%': { transform: 'translateX(0) translateY(0)' },
                '25%': { transform: 'translateX(0.5px) translateY(-0.5px)' },
                '50%': { transform: 'translateX(-0.5px) translateY(0)' },
                '75%': { transform: 'translateX(0.5px) translateY(0.5px)' },
              },
              'wind-flow': {
                '0%': { transform: 'translateX(0)', opacity: '0' },
                '30%': { opacity: '0.8' },
                '100%': { transform: 'translateX(-12px)', opacity: '0' },
              },
              'package-jitter': {
                '0%, 100%': { transform: 'rotate(0deg) scale(1)' },
                '25%': { transform: 'rotate(-3deg) scale(1.05)' },
                '75%': { transform: 'rotate(3deg) scale(1.05)' },
              },
              'hourglass-flip': {
                '0%': { transform: 'rotate(0deg)' },
                '40%, 100%': { transform: 'rotate(180deg)' },
              },
              'question-pulse': {
                '0%, 100%': { transform: 'scale(1) rotate(0deg)', opacity: '0.7' },
                '50%': { transform: 'scale(1.2) rotate(10deg)', opacity: '1' },
              }
            }
          }
        }
      }
    };
  </script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Font: Bebas Neue (Header) & Inter (iOS-style UI Font) -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  
  <style>
    /* Styling for dark mode date picker icon */
    .dark input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      cursor: pointer;
    }
    
    /* Smooth scroll for better experience */
    html {
      scroll-behavior: smooth;
    }

    /* Pull to refresh safety */
    body {
      overscroll-behavior-y: contain;
    }
  </style>
</head>
<body class="bg-[#F8FAFC] dark:bg-[#080302] text-gray-900 dark:text-white antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black transition-colors duration-300">
  
  <div id="root"></div>

  <!-- Script Aplikasi (Module + Babel) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useMemo } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Package, Truck, CheckCircle, Clock, RefreshCw, Trash2, 
      Search, AlertCircle, MapPin, X, Plus, Navigation, Filter, Moon, Sun, Zap, ArrowRight,
      Download, ChevronDown, Edit2, Calendar, User, RotateCcw, FileText, Hourglass, HelpCircle
    } from 'https://esm.sh/lucide-react@0.263.1';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, getDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyA8LV6EQ4dxHTIIabUjiHRPFcbsvoAW6Hs",
      authDomain: "tracker-3630d.firebaseapp.com",
      projectId: "tracker-3630d",
      storageBucket: "tracker-3630d.firebasestorage.app",
      messagingSenderId: "901038407111",
      appId: "1:901038407111:web:f8479511343c5c10b4ede2",
      measurementId: "G-38YMH0TWWZ"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Gagal inisialisasi Firebase", e);
    }

    // ==========================================
    // PWA INSTALL PROMPT COMPONENT (iOS Style)
    // ==========================================
    const PwaInstallPrompt = () => {
      const [isVisible, setIsVisible] = useState(false);
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isIOS, setIsIOS] = useState(false);

      useEffect(() => {
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
        if (isStandalone) return;

        const userAgent = window.navigator.userAgent.toLowerCase();
        const iosDevice = /iphone|ipad|ipod/.test(userAgent);
        setIsIOS(iosDevice);

        const handleBeforeInstallPrompt = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          setIsVisible(true);
        };

        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);

        if (window.deferredPrompt) {
          setDeferredPrompt(window.deferredPrompt);
          setIsVisible(true);
        }

        let iosTimer;
        if (iosDevice) {
          iosTimer = setTimeout(() => {
            setIsVisible(true);
          }, 2500); 
        }

        return () => {
          window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
          if (iosTimer) clearTimeout(iosTimer);
        };
      }, []);

      const handleInstall = async () => {
        if (isIOS) {
          alert("Untuk menginstal di iOS:\n\n1. Tekan ikon 'Share' di browser Anda\n2. Pilih menu 'Add to Home Screen' (Tambahkan ke Layar Utama)");
        } else if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            setIsVisible(false);
          }
          setDeferredPrompt(null);
          window.deferredPrompt = null;
        }
      };

      if (!isVisible) return null;

      return (
        <div className="fixed top-4 left-0 right-0 z-[9999] flex justify-center px-4 pointer-events-none">
          <div className="pointer-events-auto flex items-center gap-3 w-full max-w-[380px] p-3 bg-white/80 dark:bg-black/70 backdrop-blur-xl border border-white/50 dark:border-[#2a1b15] shadow-2xl rounded-2xl animate-slide-down">
            <img src="./icon-512.png" alt="App Icon" className="w-12 h-12 rounded-[12px] object-cover shadow-md shrink-0 border border-gray-100 dark:border-[#2a1b15]" onError={(e) => {e.target.style.display='none'}} />
            
            <div className="flex-1 min-w-0">
              <h4 className="font-bold text-gray-900 dark:text-white text-[14px] mb-0.5">Download This App</h4>
              <p className="text-[11px] text-gray-500 dark:text-gray-400 truncate">Biar lebih mudah dan lebih cepat</p>
            </div>
            
            <div className="flex items-center gap-3 shrink-0">
              <button 
                onClick={handleInstall}
                className="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-4 py-1.5 rounded-full shadow-sm active:scale-95 transition-all"
              >
                INSTALL
              </button>
              
              <button 
                onClick={() => setIsVisible(false)}
                className="p-1 -mr-1 rounded-full text-gray-400 hover:text-gray-900 dark:hover:text-white transition-colors"
                title="Tutup"
              >
                <X size={16} strokeWidth={2.5} />
              </button>
            </div>
          </div>
        </div>
      );
    };

    // ==========================================
    // 2. BINDERBYTE API (TRACKING)
    // ==========================================
    const COURIERS = [
      { id: 'jnt', name: 'J&T Express' },
      { id: 'jnt_cargo', name: 'J&T Cargo' },
      { id: 'sicepat', name: 'SiCepat Ekspres' },
      { id: 'anteraja', name: 'AnterAja' },
      { id: 'spx', name: 'Shopee Express (SPX)' },
      { id: 'idexpress', name: 'ID Express' },
      { id: 'ninja', name: 'Ninja Xpress' }
    ];

    const BINDERBYTE_API_KEY = '310c2ebd6dc6be501b025ffa50108f4c0c3cb454fa8b7dff7155e30c059b0074';

    const fetchTrackingFromAPI = async (awb, courier, itemName = '') => {
      if (awb.length < 5) throw new Error("Nomor resi tidak valid. Minimal 5 karakter.");

      try {
        const targetUrl = `https://api.binderbyte.com/v1/track?api_key=${BINDERBYTE_API_KEY}&courier=${courier}&awb=${awb}&_t=${Date.now()}`;
        
        const urlsToTry = [
          targetUrl,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
          `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`,
          `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        let result = null;

        for (const url of urlsToTry) {
          try {
            const res = await fetch(url);
            const data = await res.json();
            if (data && typeof data.status !== 'undefined') {
              result = data;
              break; 
            }
          } catch (proxyErr) {}
        }
        
        if (!result) {
          throw new Error("Gagal terhubung ke server. Pastikan internet stabil.");
        }

        if (result.status !== 200) {
          throw new Error(result.message || "Gagal melacak paket. Periksa kembali resi dan kurir Anda.");
        }

        const data = result.data;
        
        let mappedStatus = 'TRANSIT';
        const rawStatus = (data.summary.status || '').toUpperCase();
        if (rawStatus.includes('DELIVERED') || rawStatus.includes('SUCCESS')) mappedStatus = 'DELIVERED';
        else if (rawStatus.includes('DELIVERING') || rawStatus.includes('WITH DELIVERY COURIER')) mappedStatus = 'DELIVERING';
        else if (rawStatus.includes('PICKUP')) mappedStatus = 'PICKUP';
        else if (rawStatus === '') mappedStatus = 'PENDING';

        const timeline = (data.history || []).map((h, i) => ({
          id: i.toString() + h.date,
          description: h.desc,
          location: h.location || '',
          timestamp: h.date,
        }));

        const rawEta = data.summary.eta || (data.detail && data.detail.eta) || '';

        return {
          awb: data.summary.awb,
          courier,
          itemName,
          eta: rawEta,
          status: mappedStatus,
          timeline,
          addedAt: new Date().toISOString(),
          lastUpdated: new Date().toISOString()
        };

      } catch (err) {
        throw new Error(err.message || "Terjadi kesalahan jaringan.");
      }
    };

    // ==========================================
    // 3. UI COMPONENTS & HELPERS
    // ==========================================
    const getStatusConfig = (status) => {
      const configs = {
        'DELIVERED': { color: 'bg-black dark:bg-orange-500 text-white dark:text-black border-black dark:border-orange-400 dark:shadow-[0_0_12px_rgba(249,115,22,0.6)]', icon: CheckCircle, label: 'Tiba' },
        'DELIVERING': { color: 'bg-gray-800 dark:bg-orange-600 text-white dark:text-white border-gray-800 dark:border-orange-500', icon: Navigation, label: 'Out for delivery' },
        'TRANSIT': { color: 'bg-gray-600 dark:bg-orange-500/30 text-white dark:text-orange-100 border-gray-600 dark:border-orange-500/50', icon: Truck, label: 'Transit' },
        'PICKUP': { color: 'bg-gray-200 dark:bg-orange-500/20 text-gray-800 dark:text-orange-200 border-gray-300 dark:border-orange-500/40', icon: Package, label: 'Picked up' },
        'PENDING': { color: 'bg-white dark:bg-[#1f140f] text-gray-600 dark:text-gray-400 border-gray-200 dark:border-[#382015]', icon: Clock, label: 'Pending' },
      };
      return configs[status] || configs['PENDING'];
    };

    const StatusBadge = ({ status }) => {
      const config = getStatusConfig(status);
      const Icon = config.icon;

      return (
        <span className={`flex items-center justify-center gap-0.5 px-1 py-0.5 rounded-full text-[8px] sm:text-[9px] font-bold border ${config.color} tracking-tight w-full shadow-sm transition-all duration-300`}>
          <Icon size={9} strokeWidth={2.5} className="shrink-0" />
          <span className="truncate leading-none pt-[1px]">{config.label}</span>
        </span>
      );
    };

    const SupplierEtaBadge = ({ eta }) => {
      if (!eta) {
        return (
          <span className="flex items-center justify-center px-1.5 py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold border bg-gray-100 dark:bg-[#1f1008] text-gray-500 dark:text-gray-400 border-gray-200 dark:border-[#381c0e] tracking-tight w-full shadow-sm transition-all duration-300 text-center leading-snug whitespace-normal break-words min-h-[28px]">
            Belum ada Estimasi
          </span>
        );
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const etaDate = new Date(eta.replace(' ', 'T'));
      etaDate.setHours(0, 0, 0, 0);
      
      if (isNaN(etaDate.getTime())) {
         return (
          <span className="flex items-center justify-center px-1.5 py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold border bg-gray-100 dark:bg-[#1f1008] text-gray-500 dark:text-gray-400 border-gray-200 dark:border-[#381c0e] tracking-tight w-full shadow-sm transition-all duration-300 text-center leading-snug whitespace-normal break-words min-h-[28px]">
            {eta}
          </span>
        );
      }

      const diffTime = etaDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      let colorClass = '';

      if (diffDays === 0) {
        colorClass = 'bg-blue-100 dark:bg-blue-900/30 text-blue-700 dark:text-blue-400 border-blue-200 dark:border-blue-800/50';
      } else if (diffDays === 1) {
        colorClass = 'bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-300 border-blue-100 dark:border-blue-800/30';
      } else if (diffDays > 1) {
        colorClass = 'bg-orange-100 dark:bg-orange-900/30 text-orange-700 dark:text-orange-400 border-orange-200 dark:border-orange-800/50';
      } else {
        colorClass = 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-400 border-red-200 dark:border-red-800/50';
      }

      // Convert specific date into a short readable text format e.g., "4 Apr"
      const dateText = new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short' }).format(etaDate);

      return (
        <span className={`flex items-center justify-center px-1.5 py-1.5 rounded-lg text-[9px] sm:text-[10px] font-bold border ${colorClass} tracking-tight w-full shadow-sm transition-all duration-300 text-center leading-snug whitespace-normal break-words min-h-[28px]`}>
          {dateText}
        </span>
      );
    };

    const getSupplierRelativeText = (eta) => {
      if (!eta) return '...';
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const etaDate = new Date(eta.replace(' ', 'T'));
      etaDate.setHours(0, 0, 0, 0);

      if (isNaN(etaDate.getTime())) return eta;

      const diffTime = etaDate - today;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

      if (diffDays === 0) return 'Hari ini';
      if (diffDays === 1) return 'Besok';
      if (diffDays > 1) return `${diffDays} hari lagi`;
      return `Telat ${Math.abs(diffDays)} hr`;
    };

    const getCourierStyle = (courierId) => {
      const labels = {
        'spx': 'SPX', 'jnt': 'J&T', 'jnt_cargo': 'J&TC', 'sicepat': 'SiCepat', 'anteraja': 'AnterAja',
        'idexpress': 'ID', 'ninja': 'NIN'
      };

      return {
        className: `w-full py-1.5 px-1 rounded-lg bg-black dark:bg-gradient-to-br dark:from-orange-400 dark:to-red-600 dark:border-transparent text-white flex items-center justify-center font-black text-[10px] sm:text-xs shadow-sm dark:shadow-[0_0_15px_rgba(249,115,22,0.5)] tracking-tight leading-none`,
        label: labels[courierId] || 'PKG'
      };
    };

    const getPackageCreationDate = (pkg) => {
      const dateString = pkg.timeline && pkg.timeline.length > 0 
        ? pkg.timeline[pkg.timeline.length - 1].timestamp 
        : pkg.addedAt;
      const parsedDate = new Date((dateString || '').replace(' ', 'T'));
      return isNaN(parsedDate.getTime()) ? new Date(pkg.addedAt).getTime() : parsedDate.getTime();
    };

    const formatEtaBadge = (etaStr) => {
      if (!etaStr) return null;
      const d = new Date(etaStr.replace(' ', 'T'));
      if (!isNaN(d.getTime())) {
        return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short' }).format(d);
      }
      return etaStr; 
    };

    const PackageCapsule = ({ pkg, onRemove, onEdit, onRequestMarkDelivered, onUndoDelivered, isExpanded, onToggleExpand, currentView, deliveringAwb }) => {
      if (!pkg) return null;
      
      const isSupplier = pkg.type === 'supplier';
      const latestEvent = pkg.timeline?.[0];
      const courierAvatar = getCourierStyle(pkg.courier);
      const courierNameFull = COURIERS.find(c => c.id === pkg.courier)?.name || pkg.courier;

      const firstEventDate = pkg.timeline && pkg.timeline.length > 0 
        ? pkg.timeline[pkg.timeline.length - 1].timestamp 
        : pkg.addedAt;

      const formatDate = (dateString) => {
        if (!dateString) return '-';
        const d = new Date(dateString.replace(' ', 'T')); 
        if (isNaN(d.getTime())) return dateString;
        return new Intl.DateTimeFormat('id-ID', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        }).format(d);
      };

      const etaDisplay = formatEtaBadge(pkg.eta);
      const supplierRelativeText = isSupplier ? getSupplierRelativeText(pkg.eta) : '';

      // Status ini sekarang dikontrol dari prop App agar bisa dianimasikan setelah modal disetujui
      const isFlying = deliveringAwb === pkg.awb;

      const getSupplierIconConfig = () => {
        if (!pkg.eta) return { icon: HelpCircle, animate: "animate-question-pulse" };

        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const etaDate = new Date(pkg.eta.replace(' ', 'T'));
        etaDate.setHours(0, 0, 0, 0);

        if (isNaN(etaDate.getTime())) return { icon: HelpCircle, animate: "animate-question-pulse" };

        const diffTime = etaDate - today;
        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

        if (diffDays === 0) return { icon: Truck, animate: "animate-truck-drive", showWind: true };
        if (diffDays === 1) return { icon: Package, animate: "animate-package-jitter" };
        return { icon: Hourglass, animate: "animate-hourglass-flip" };
      };

      const supplierIconData = getSupplierIconConfig();
      const IconComp = supplierIconData.icon;

      const displayTitle = isSupplier ? pkg.itemName : (pkg.itemName ? pkg.itemName : `Paket ${courierAvatar.label}`);
      const displaySubtitle = isSupplier ? pkg.supplierName : (latestEvent?.description || 'Status belum diperbarui');

      return (
        <div className={`group relative bg-white dark:bg-[#120a07] rounded-[24px] shadow-sm border border-gray-100 dark:border-[#2a1b15] overflow-hidden transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] ${isFlying ? 'opacity-0 -translate-y-24 -translate-x-16 scale-50 pointer-events-none z-50' : 'mb-2 dark:hover:border-orange-500/50 dark:hover:shadow-[0_0_25px_rgba(249,115,22,0.15)]'}`}>
          <div className="relative z-10">
            <div 
              className={`px-3 py-2.5 sm:px-4 sm:py-3 flex flex-row items-stretch justify-between gap-3 ${!isSupplier ? 'cursor-pointer' : ''}`}
              onClick={!isSupplier ? onToggleExpand : undefined}
            >
              <div className={`flex flex-col items-stretch justify-center gap-1 shrink-0 ${isSupplier ? 'w-[88px] sm:w-[100px]' : 'w-[60px] sm:w-[68px]'}`}>
                
                {isSupplier && currentView === 'riwayat' ? (
                  <div className="flex items-center justify-center w-full h-[58px] sm:h-[64px] bg-black text-white rounded-lg font-black text-[11px] sm:text-sm uppercase tracking-widest shadow-sm dark:bg-white dark:text-black">
                    <CheckCircle size={14} className="mr-1.5 shrink-0" strokeWidth={3} />
                    TIBA
                  </div>
                ) : (
                  <>
                    <div className={isSupplier ? `w-full py-1.5 px-1.5 rounded-lg bg-gray-800 dark:bg-[#1a120e] border border-gray-700 dark:border-[#381c0e] text-white flex items-center justify-center font-black text-[10px] sm:text-[11px] shadow-sm tracking-tight leading-none gap-1.5 overflow-hidden` : courierAvatar.className}>
                      {isSupplier ? (
                        <div className="relative flex items-center gap-1.5">
                          {supplierIconData.showWind && pkg.status !== 'DELIVERED' && (
                            <div className="absolute right-full mr-0.5 flex flex-col gap-[2px]">
                              <div className="w-1.5 h-[1.5px] bg-white/40 rounded-full animate-wind-1"></div>
                              <div className="w-2.5 h-[1.5px] bg-white/60 rounded-full animate-wind-2"></div>
                              <div className="w-2 h-[1.5px] bg-white/40 rounded-full animate-wind-3"></div>
                            </div>
                          )}
                          <IconComp size={14} strokeWidth={2.5} className={`shrink-0 ${pkg.status !== 'DELIVERED' ? supplierIconData.animate : ""}`} />
                          <span className="truncate pt-[1px]">{supplierRelativeText}</span>
                        </div>
                      ) : (
                        <span className="truncate">{etaDisplay ? etaDisplay : courierAvatar.label}</span>
                      )}
                    </div>
                    {isSupplier && pkg.status !== 'DELIVERED' ? (
                      <SupplierEtaBadge eta={pkg.eta} />
                    ) : (
                      <StatusBadge status={pkg.status} />
                    )}
                  </>
                )}
              </div>

              <div className="flex-1 min-w-0 flex flex-col justify-center">
                {isSupplier ? (
                  pkg.sj && (
                    <span className="text-[8px] sm:text-[9px] text-gray-400 dark:text-gray-500 font-medium mb-0.5 tracking-wider uppercase transition-colors">
                      {pkg.sj}
                    </span>
                  )
                ) : (
                  <span className="text-[8px] sm:text-[9px] text-gray-400 dark:text-gray-500 font-medium mb-0.5 tracking-wider uppercase group-hover:dark:text-orange-400/80 transition-colors">
                    {formatDate(firstEventDate)}
                  </span>
                )}
                
                <h3 className="font-bold text-gray-900 dark:text-white text-sm sm:text-base leading-tight break-words whitespace-normal mb-1 tracking-tight group-hover:dark:text-orange-50 transition-colors">
                  {displayTitle}
                </h3>
                <p className="text-xs text-gray-600 dark:text-gray-400 line-clamp-2 leading-snug font-medium">
                  {displaySubtitle}
                </p>
              </div>

              <div className="flex flex-col items-center justify-center border-l border-gray-100 dark:border-orange-500/20 pl-2 sm:pl-3 shrink-0 gap-1 sm:gap-1.5 group-hover:dark:border-orange-500/40 transition-colors">
                {isSupplier && pkg.status !== 'DELIVERED' && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); onRequestMarkDelivered(pkg); }}
                    className="p-1.5 sm:p-2 rounded-xl text-gray-900 dark:text-orange-400 dark:bg-orange-500/10 hover:text-white dark:hover:text-white hover:bg-green-500 dark:hover:bg-green-500 transition-colors"
                    title="Tandai Tiba"
                  >
                    <CheckCircle size={16} />
                  </button>
                )}
                
                {isSupplier && pkg.status === 'DELIVERED' && currentView === 'riwayat' && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); onUndoDelivered(pkg); }}
                    className="p-1.5 sm:p-2 rounded-xl text-gray-900 dark:text-orange-400 dark:bg-orange-500/10 hover:text-white dark:hover:text-white hover:bg-orange-500 dark:hover:bg-orange-500 transition-colors"
                    title="Batal Tiba (Kembalikan)"
                  >
                    <RotateCcw size={16} />
                  </button>
                )}

                {currentView !== 'riwayat' && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); onEdit(pkg); }}
                    className="p-1.5 sm:p-2 rounded-xl text-gray-900 dark:text-orange-400 dark:bg-orange-500/10 hover:text-white dark:hover:text-white hover:bg-blue-500 dark:hover:bg-blue-600 transition-colors"
                    title={isSupplier ? "Edit Note Supplier" : "Edit Nama Barang"}
                  >
                    <Edit2 size={16} />
                  </button>
                )}
                {!(isSupplier && currentView === 'aktif') && (
                  <button 
                    onClick={(e) => { e.stopPropagation(); onRemove(pkg); }}
                    className="p-1.5 sm:p-2 rounded-xl text-gray-900 dark:text-orange-400 dark:bg-orange-500/10 hover:text-white dark:hover:text-white hover:bg-red-500 dark:hover:bg-red-600 transition-colors"
                    title="Hapus"
                  >
                    <Trash2 size={16} />
                  </button>
                )}
              </div>
            </div>

            {isExpanded && !isSupplier && (
              <div className="bg-gray-50 dark:bg-[#0a0503] p-4 sm:p-5 border-t border-gray-100 dark:border-[#2a1b15]">
                <div className="mb-5 bg-white dark:bg-[#120a07] p-3 rounded-xl border border-gray-200 dark:border-[#2a1b15] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                  <div>
                    <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0.5">Nomor Resi</p>
                    <p className="font-mono text-sm font-semibold text-gray-900 dark:text-white">{pkg.awb}</p>
                  </div>
                  <div className="sm:text-right mt-2 sm:mt-0">
                    <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0.5">Kurir</p>
                    <p className="text-sm font-semibold text-gray-900 dark:text-white">{courierNameFull}</p>
                  </div>
                </div>

                <h4 className="text-xs font-bold text-gray-400 dark:text-gray-600 mb-4 tracking-wider uppercase">Riwayat Perjalanan</h4>
                <div className="relative border-l-2 border-gray-200 dark:border-[#2a1b15] ml-3 space-y-6 pb-2">
                  {(pkg.timeline || []).map((event, index) => (
                    <div key={event.id || index} className="relative pl-6">
                      <div className={`absolute -left-[9px] top-1 h-4 w-4 rounded-full border-2 ${index === 0 ? 'bg-black dark:bg-orange-500 ring-4 ring-gray-200 dark:ring-[#2a1b15] border-white dark:border-[#120a07] dark:shadow-[0_0_10px_rgba(249,115,22,0.5)]' : 'bg-gray-300 dark:bg-[#2a1b15] border-gray-50 dark:border-[#0a0503]'}`}></div>
                      
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-1.5">
                        <div className="pr-4">
                          <p className={`text-sm leading-relaxed ${index === 0 ? 'font-semibold text-gray-900 dark:text-orange-50' : 'text-gray-600 dark:text-gray-400 font-medium'}`}>
                            {event.description}
                          </p>
                          {event.location && (
                            <p className="text-xs font-semibold text-black dark:text-gray-500 mt-1 flex items-center gap-1">
                              <MapPin size={12} /> {event.location}
                            </p>
                          )}
                        </div>
                        <span className="text-[11px] font-medium text-gray-400 dark:text-gray-600 whitespace-nowrap mt-1 sm:mt-0">
                          {formatDate(event.timestamp)}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [packages, setPackages] = useState([]);
      
      const [inputValue, setInputValue] = useState('');
      const [itemName, setItemName] = useState('');
      const [selectedCourier, setSelectedCourier] = useState(COURIERS[0].id);
      
      const [supplierName, setSupplierName] = useState('');
      const [supplierSj, setSupplierSj] = useState('');
      const [supplierNote, setSupplierNote] = useState('');
      const [supplierEta, setSupplierEta] = useState('');

      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [user, setUser] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);
      
      const [searchQuery, setSearchQuery] = useState('');
      const [sortBy, setSortBy] = useState('oldest');
      const [packageToDelete, setPackageToDelete] = useState(null);
      const [packageToDeliver, setPackageToDeliver] = useState(null);
      const [deliveringAwb, setDeliveringAwb] = useState(null);

      const [isSearchActive, setIsSearchActive] = useState(false);
      const [expandedAwb, setExpandedAwb] = useState(null);
      
      const [editingPackage, setEditingPackage] = useState(null);
      const [editItemName, setEditItemName] = useState('');
      const [editSupplierName, setEditSupplierName] = useState('');
      const [editSupplierSj, setEditSupplierSj] = useState('');
      const [editSupplierEta, setEditSupplierEta] = useState('');

      const [isAutoSyncing, setIsAutoSyncing] = useState(false);
      const [currentView, setCurrentView] = useState('aktif');
      const [isDropdownOpen, setIsDropdownOpen] = useState(false);
      const [activeTab, setActiveTab] = useState('online');

      const [isScrolled, setIsScrolled] = useState(false);

      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 80);
        };
        window.addEventListener('scroll', handleScroll);
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      const [theme, setTheme] = useState(() => {
        if (typeof window !== 'undefined') {
          return localStorage.getItem('theme') || 'light';
        }
        return 'light';
      });

      useEffect(() => {
        const root = document.documentElement;
        if (theme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        localStorage.setItem('theme', theme);
      }, [theme]);

      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (e) { console.error("Auth init error:", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      useEffect(() => {
        if (!user || !db) return;
        const publicDataRef = collection(db, 'tracked_packages');
        
        const unsubscribe = onSnapshot(publicDataRef, (snapshot) => {
          const pkgs = [];
          snapshot.forEach(doc => {
            if (doc.id !== '_system_sync_status_') {
              pkgs.push(doc.data());
            }
          });
          pkgs.sort((a, b) => getPackageCreationDate(a) - getPackageCreationDate(b));
          setPackages(pkgs);
        }, (error) => {
          console.error("Snapshot error:", error);
        });

        return () => unsubscribe();
      }, [user]);

      const packagesRef = useRef(packages);
      useEffect(() => {
        packagesRef.current = packages;
      }, [packages]);

      useEffect(() => {
        if (!user || !db) return;

        let isMounted = true;
        let timeoutId;

        const checkAndRunAutoSync = async () => {
          const pkgs = packagesRef.current;
          const now = new Date();
          const day = now.getDay();
          const hour = now.getHours();

          const y = now.getFullYear();
          const m = String(now.getMonth() + 1).padStart(2, '0');
          const d = String(now.getDate()).padStart(2, '0');
          const dateString = `${y}-${m}-${d}`;
          
          let globalSyncState = { date: dateString, morningDone: false, afternoonDone: false };
          let shouldSync = false;

          try {
            const syncDocRef = doc(db, 'tracked_packages', '_system_sync_status_');
            const syncSnap = await getDoc(syncDocRef);
            
            if (syncSnap.exists()) {
              const data = syncSnap.data();
              if (data.date === dateString) {
                globalSyncState = data;
              }
            }

            if (day !== 0) {
              if (hour >= 9 && hour < 15 && !globalSyncState.morningDone) {
                shouldSync = true;
                globalSyncState.morningDone = true;
              } else if (hour >= 15 && !globalSyncState.afternoonDone) {
                shouldSync = true;
                globalSyncState.morningDone = true;
                globalSyncState.afternoonDone = true;
              }
            }

            if (shouldSync && pkgs.length > 0) {
              await setDoc(syncDocRef, globalSyncState);

              if (isMounted) setIsAutoSyncing(true);
              
              for (const pkg of pkgs) {
                if (!isMounted) break;
                if (pkg.status === 'DELIVERED' || pkg.type === 'supplier') continue;
                
                try {
                  const updatedData = await fetchTrackingFromAPI(pkg.awb, pkg.courier, pkg.itemName);
                  updatedData.type = pkg.type || 'online'; 
                  await setDoc(doc(db, 'tracked_packages', pkg.awb), updatedData, { merge: true });
                } catch (err) {
                  console.error(`Auto-sync gagal untuk ${pkg.awb}`, err);
                }
                
                await new Promise(resolve => setTimeout(resolve, 1500));
              }
              
              if (isMounted) setIsAutoSyncing(false);
            }
          } catch (e) {
            console.error("Gagal membaca atau menulis status sync global", e);
          }

          if (!isMounted) return;

          const nextTarget = new Date(now);
          nextTarget.setMinutes(0, 0, 0);

          if (day === 0) {
            nextTarget.setDate(now.getDate() + 1);
            nextTarget.setHours(9);
          } else {
            if (hour < 9) {
              nextTarget.setHours(9);
            } else if (hour >= 9 && hour < 15) {
              nextTarget.setHours(15);
            } else {
              nextTarget.setDate(now.getDate() + 1);
              nextTarget.setHours(9);
              if (nextTarget.getDay() === 0) {
                nextTarget.setDate(nextTarget.getDate() + 1);
              }
            }
          }

          const delay = nextTarget.getTime() - new Date().getTime();
          
          timeoutId = setTimeout(() => {
            checkAndRunAutoSync();
          }, Math.max(delay, 1000));
        };

        const initTimeout = setTimeout(() => {
          checkAndRunAutoSync();
        }, 3000);
        
        return () => {
          isMounted = false;
          clearTimeout(initTimeout);
          clearTimeout(timeoutId);
        };
      }, [user, db]);

      const performTracking = async (awbToTrack, courierToTrack, itemNameToTrack, packageType = 'online') => {
        setIsLoading(true);
        setError('');

        try {
          const newData = await fetchTrackingFromAPI(awbToTrack, courierToTrack, itemNameToTrack);
          newData.type = packageType;
          const docRef = doc(db, 'tracked_packages', newData.awb);
          await setDoc(docRef, newData);
          
          setInputValue('');
          setItemName('');
          setIsModalOpen(false);
        } catch (err) {
          setError(err.message || 'Gagal melacak resi. Silakan coba lagi.');
        } finally {
          setIsLoading(false);
        }
      };

      const handleAddPackage = async (e) => {
        e.preventDefault();
        if (!inputValue.trim() || !user || !db) return;

        if (packages.some(p => p.awb.toLowerCase() === inputValue.toLowerCase())) {
          setError('Nomor resi ini sudah ada di daftar pantauan Anda.');
          return;
        }

        await performTracking(inputValue.trim().toUpperCase(), selectedCourier, itemName.trim(), 'online');
      };

      const handleAddSupplierNote = async (e) => {
        e.preventDefault();
        if (!user || !db) return;
        
        setIsLoading(true);
        setError('');

        try {
          const newId = `SUP_${Date.now()}`;
          const newPkg = {
            awb: newId,
            courier: 'MANUAL',
            supplierName: supplierName.trim(),
            sj: supplierSj.trim(),
            itemName: supplierNote.trim(),
            eta: supplierEta || '',
            type: 'supplier',
            status: 'PENDING',
            timeline: [{
              id: Date.now().toString(),
              description: 'Catatan Supplier Dibuat',
              timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19)
            }],
            addedAt: new Date().toISOString(),
            lastUpdated: new Date().toISOString()
          };
          
          await setDoc(doc(db, 'tracked_packages', newId), newPkg);
          
          setIsModalOpen(false);
          setSupplierName('');
          setSupplierSj('');
          setSupplierNote('');
          setSupplierEta('');
        } catch (err) {
          setError('Gagal menyimpan catatan supplier.');
        } finally {
          setIsLoading(false);
        }
      };

      const requestRemovePackage = (pkg) => setPackageToDelete(pkg);

      const confirmRemovePackage = async () => {
        if (!user || !db || !packageToDelete) return;
        try {
          await deleteDoc(doc(db, 'tracked_packages', packageToDelete.awb));
          setPackageToDelete(null);
        } catch (err) { console.error("Failed to remove package", err); }
      };

      const requestMarkDelivered = (pkg) => setPackageToDeliver(pkg);

      const confirmMarkDelivered = async () => {
        if (!user || !db || !packageToDeliver) return;
        
        const pkg = packageToDeliver;
        setPackageToDeliver(null); // Tutup pop-up segera
        setDeliveringAwb(pkg.awb); // Nyalakan animasi terbang

        // Tunggu animasi terbang selesai (600ms) sebelum update database
        setTimeout(async () => {
          try {
            await setDoc(doc(db, 'tracked_packages', pkg.awb), { 
              status: 'DELIVERED',
              lastUpdated: new Date().toISOString()
            }, { merge: true });
          } catch (err) { console.error("Failed to update status", err); }
          setDeliveringAwb(null);
        }, 600);
      };

      const requestEditPackage = (pkg) => {
        setEditingPackage(pkg);
        setEditItemName(pkg.itemName || '');
        if (pkg.type === 'supplier') {
          setEditSupplierName(pkg.supplierName || '');
          setEditSupplierSj(pkg.sj || '');
          setEditSupplierEta(pkg.eta || '');
        }
      };

      const confirmEditPackage = async (e) => {
        e.preventDefault();
        if (!user || !db || !editingPackage) return;
        try {
          if (editingPackage.type === 'supplier') {
            await setDoc(doc(db, 'tracked_packages', editingPackage.awb), { 
              itemName: editItemName.trim(),
              supplierName: editSupplierName.trim(),
              sj: editSupplierSj.trim(),
              eta: editSupplierEta
            }, { merge: true });
          } else {
            await setDoc(doc(db, 'tracked_packages', editingPackage.awb), { itemName: editItemName.trim() }, { merge: true });
          }
          setEditingPackage(null);
        } catch (err) { console.error("Failed to edit package", err); }
      };

      const undoSupplierDelivered = async (pkg) => {
        if (!user || !db) return;
        try {
          await setDoc(doc(db, 'tracked_packages', pkg.awb), { 
            status: 'PENDING',
            lastUpdated: new Date().toISOString()
          }, { merge: true });
        } catch (err) { console.error("Failed to undo status", err); }
      };

      const checkIsArchived = (pkg) => {
        if (pkg.status !== 'DELIVERED') return false;
        if (pkg.type === 'supplier') return true;
        const dateStr = (pkg.timeline && pkg.timeline.length > 0) ? pkg.timeline[0].timestamp : pkg.lastUpdated;
        const d = new Date((dateStr || '').replace(' ', 'T'));
        if (isNaN(d.getTime())) return false;
        return (new Date().getTime() - d.getTime()) >= (24 * 60 * 60 * 1000); 
      };

      const allOnlinePackages = packages.filter(p => !p.type || p.type === 'online');
      const allSupplierPackages = packages.filter(p => p.type === 'supplier');

      const activeOnline = allOnlinePackages.filter(p => !checkIsArchived(p));
      const archivedOnline = allOnlinePackages.filter(p => checkIsArchived(p));
      const sourceOnlinePackages = currentView === 'aktif' ? activeOnline : archivedOnline;

      const activeSupplier = allSupplierPackages.filter(p => !checkIsArchived(p));
      const archivedSupplier = allSupplierPackages.filter(p => checkIsArchived(p));
      const sourceSupplierPackages = currentView === 'aktif' ? activeSupplier : archivedSupplier;

      const filterAndSort = (pkgs) => {
        return pkgs.filter(pkg => {
          const query = searchQuery.toLowerCase();
          return (
            pkg.awb.toLowerCase().includes(query) ||
            (pkg.itemName && pkg.itemName.toLowerCase().includes(query)) ||
            (pkg.courier && pkg.courier.toLowerCase().includes(query)) ||
            (pkg.supplierName && pkg.supplierName.toLowerCase().includes(query)) ||
            (pkg.sj && pkg.sj.toLowerCase().includes(query))
          );
        }).sort((a, b) => {
          if (sortBy === 'newest') return getPackageCreationDate(b) - getPackageCreationDate(a);
          if (sortBy === 'oldest') return getPackageCreationDate(a) - getPackageCreationDate(b);
          if (sortBy === 'status') {
            if (a.type === 'supplier') {
              const getSupplierUrgencyValue = (p) => {
                if (!p.eta) return 9999;
                const today = new Date(); today.setHours(0,0,0,0);
                const eta = new Date(p.eta.replace(' ', 'T')); eta.setHours(0,0,0,0);
                if (isNaN(eta.getTime())) return 9999;
                const diff = Math.ceil((eta - today) / (1000 * 60 * 60 * 24));
                if (diff < 0) return diff - 100;
                return diff;
              };
              return getSupplierUrgencyValue(a) - getSupplierUrgencyValue(b);
            } else {
              const onlineStatusOrder = { 'DELIVERING': 1, 'TRANSIT': 2, 'PICKUP': 3, 'PENDING': 4, 'DELIVERED': 5 };
              return (onlineStatusOrder[a.status] || 99) - (onlineStatusOrder[b.status] || 99);
            }
          }
          return 0;
        });
      };

      const displayOnlinePackages = filterAndSort(sourceOnlinePackages);
      const displaySupplierPackages = filterAndSort(sourceSupplierPackages);

      return (
        <div className="min-h-screen font-sans relative pb-20 transition-colors duration-700">
          
          <PwaInstallPrompt />

          <div className="fixed inset-0 z-[-1] hidden dark:block bg-[#080302] pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-orange-600/15 blur-[80px] rounded-full"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-red-600/15 blur-[80px] rounded-full"></div>
          </div>

          <header className="pt-6 sm:pt-8 px-3 sm:px-8">
            <div className="max-w-2xl mx-auto text-center mb-2 sm:mb-3">
              <h1 
                className="text-5xl sm:text-6xl mb-1 tracking-wide text-gray-900 dark:text-white" 
                style={{ fontFamily: "'Bebas Neue', sans-serif" }}
              >
                YEN BANGUNAN
              </h1>
            </div>
          </header>

          <div className={`sticky top-0 z-[100] w-full transition-all duration-300 ${isScrolled ? 'bg-[#F8FAFC]/80 dark:bg-[#080302]/80 backdrop-blur-xl border-b border-gray-200 dark:border-[#2a1b15] py-2' : 'bg-transparent pt-1 pb-3'}`}>
            <div className="max-w-2xl mx-auto px-2 sm:px-8 relative">
              
              <div className="flex items-center justify-between px-1 h-11 sm:h-12 gap-1 sm:gap-2">
                
                {isSearchActive ? (
                  <div className="flex-1 relative flex items-center h-full transition-all animate-in fade-in slide-in-from-left-4 duration-300">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                      <Search size={18} />
                    </div>
                    <input
                      type="text"
                      autoFocus
                      placeholder={activeTab === 'online' ? "Cari resi, nama, kurir..." : "Cari supplier, notes, SJ..."}
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-10 py-0 h-full bg-white dark:bg-[#130d0a] border border-gray-200 dark:border-[#2a1b15] rounded-[14px] sm:rounded-2xl focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white font-medium text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-600"
                    />
                    <button
                      onClick={() => { setIsSearchActive(false); setSearchQuery(''); }}
                      className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-900 dark:text-orange-500/60 dark:hover:text-orange-400"
                    >
                      <X size={18} />
                    </button>
                  </div>
                ) : (
                  <div className="flex-1 relative flex items-center h-full animate-in fade-in slide-in-from-right-4 duration-300 z-50">
                    
                    {isDropdownOpen && <div className="fixed inset-0 z-40" onClick={() => setIsDropdownOpen(false)}></div>}

                    <button 
                      onClick={() => setIsDropdownOpen(!isDropdownOpen)}
                      className="relative z-50 flex items-center gap-1 sm:gap-1.5 focus:outline-none group max-w-full origin-left"
                    >
                      <h2 className="text-[15px] sm:text-2xl font-bold text-gray-900 dark:text-white tracking-tight flex items-center gap-1 sm:gap-2 whitespace-nowrap truncate">
                        <span className="truncate">
                          {currentView === 'aktif' ? (
                            activeTab === 'online' ? (
                              <><span className="sm:hidden">Online</span><span className="hidden sm:inline">DARI ONLINE</span></>
                            ) : (
                              <><span className="sm:hidden">Supplier</span><span className="hidden sm:inline">DARI SUPPLIER</span></>
                            )
                          ) : (
                            <><span className="sm:hidden">Riwayat</span><span className="hidden sm:inline">Riwayat Tiba</span></>
                          )}
                        </span>
                        
                        <span className="bg-gray-200 dark:bg-orange-500/20 text-gray-600 dark:text-orange-400 px-1.5 sm:px-2.5 py-0.5 rounded-full text-[10px] sm:text-sm font-semibold flex items-center gap-1 sm:gap-1.5 shrink-0 dark:border dark:border-orange-500/30">
                          {activeTab === 'online' ? sourceOnlinePackages.length : sourceSupplierPackages.length}
                          {activeTab === 'online' && isAutoSyncing && currentView === 'aktif' && <RefreshCw size={12} className="animate-spin text-gray-400 dark:text-orange-400" />}
                        </span>
                        <ChevronDown size={16} className={`shrink-0 text-gray-400 dark:text-orange-400 transition-transform duration-300 ${isDropdownOpen ? 'rotate-180' : ''}`} />
                      </h2>
                    </button>
                    
                    <div 
                      className={`absolute top-[120%] mt-1 sm:mt-2 left-0 w-56 sm:w-60 bg-white dark:bg-[#130d0a] border border-gray-100 dark:border-orange-500/30 rounded-[20px] shadow-2xl py-1.5 z-50 overflow-hidden transition-all duration-300 ease-[cubic-bezier(0.16,1,0.3,1)] origin-top-left ${
                        isDropdownOpen 
                          ? 'opacity-100 translate-y-0 scale-100 pointer-events-auto' 
                          : 'opacity-0 -translate-y-3 scale-95 pointer-events-none'
                      }`}
                    >
                      <button 
                        onClick={() => { setCurrentView('aktif'); setIsDropdownOpen(false); }}
                        className={`w-full text-left px-4 py-3.5 text-sm font-bold flex items-center justify-between transition-colors ${currentView === 'aktif' ? 'text-black dark:text-orange-400 bg-gray-50 dark:bg-orange-500/10' : 'text-gray-600 dark:text-orange-200/70 hover:bg-gray-50 dark:hover:bg-orange-500/5'}`}
                      >
                        {activeTab === 'online' ? 'DARI ONLINE' : 'DARI SUPPLIER'}
                        <span className="bg-gray-100 dark:bg-orange-500/20 py-0.5 px-2.5 rounded-full text-xs text-gray-500 dark:text-orange-400">{activeTab === 'online' ? activeOnline.length : activeSupplier.length}</span>
                      </button>
                      <button 
                        onClick={() => { setCurrentView('riwayat'); setIsDropdownOpen(false); }}
                        className={`w-full text-left px-4 py-3.5 text-sm font-bold flex items-center justify-between transition-colors ${currentView === 'riwayat' ? 'text-black dark:text-orange-400 bg-gray-50 dark:bg-orange-500/10' : 'text-gray-600 dark:text-orange-200/70 hover:bg-gray-50 dark:hover:bg-orange-500/5'}`}
                      >
                        Riwayat Tiba (History)
                        <span className="bg-gray-100 dark:bg-orange-500/20 py-0.5 px-2.5 rounded-full text-xs text-gray-500 dark:text-orange-400">{activeTab === 'online' ? archivedOnline.length : archivedSupplier.length}</span>
                      </button>
                    </div>

                  </div>
                )}

                {!isSearchActive && (
                  <div className="flex justify-center shrink-0 z-40 mx-0.5 sm:mx-1">
                    <div className="relative flex items-center h-10 sm:h-12 bg-gray-200/80 dark:bg-orange-950/30 rounded-[14px] sm:rounded-2xl border border-gray-200 dark:border-orange-500/20 overflow-hidden p-0 w-24 sm:w-[110px] shadow-sm">
                      <div
                        className="absolute top-0 bottom-0 bg-white dark:bg-gradient-to-r dark:from-orange-500 dark:to-yellow-500 shadow-sm transition-all duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]"
                        style={{ left: activeTab === 'online' ? '0%' : '50%', width: '50%', borderRadius: 'inherit' }}
                      ></div>
                      <button
                        onClick={() => { setActiveTab('online'); setIsSearchActive(false); setSearchQuery(''); setCurrentView('aktif'); }}
                        className={`relative z-10 w-1/2 h-full flex items-center justify-center text-[11px] sm:text-xs font-bold tracking-widest uppercase transition-colors duration-300 ${activeTab === 'online' ? 'text-black dark:text-black' : 'text-gray-500 hover:text-gray-800 dark:text-orange-200 dark:hover:text-orange-100'}`}
                      >
                        OL
                      </button>
                      <button
                        onClick={() => { setActiveTab('supplier'); setIsSearchActive(false); setSearchQuery(''); setCurrentView('aktif'); setSortBy('status'); }}
                        className={`relative z-10 w-1/2 h-full flex items-center justify-center text-[11px] sm:text-xs font-bold tracking-widest uppercase transition-colors duration-300 ${activeTab === 'supplier' ? 'text-black dark:text-black' : 'text-gray-500 hover:text-gray-800 dark:text-orange-200 dark:hover:text-orange-100'}`}
                      >
                        SUP
                      </button>
                    </div>
                  </div>
                )}

                <div className="flex items-center gap-1 sm:gap-2 shrink-0">
                  
                  {!isSearchActive && (activeTab === 'online' ? allOnlinePackages.length : allSupplierPackages.length) > 0 && (
                    <button 
                      onClick={() => setIsSearchActive(true)}
                      className="h-10 w-10 sm:h-12 sm:w-12 bg-white dark:bg-orange-500/10 border border-gray-200 dark:border-orange-500/30 rounded-[14px] sm:rounded-2xl flex items-center justify-center text-gray-700 dark:text-orange-400 shadow-sm hover:bg-gray-50 dark:hover:bg-orange-500/20 transition-colors"
                      title="Cari"
                    >
                      <Search size={20} className="sm:w-5 sm:h-5" />
                    </button>
                  )}

                  {(activeTab === 'online' ? allOnlinePackages.length : allSupplierPackages.length) > 0 && (
                    <div className="relative">
                      <button 
                        className="h-10 w-10 sm:h-12 sm:w-12 bg-white dark:bg-orange-500/10 border border-gray-200 dark:border-orange-500/30 rounded-[14px] sm:rounded-2xl flex items-center justify-center text-gray-700 dark:text-orange-400 shadow-sm hover:bg-gray-50 dark:hover:bg-orange-500/20 transition-colors"
                        title="Filter Data"
                      >
                        <Filter size={20} className="sm:w-5 sm:h-5" />
                        {sortBy !== 'oldest' && <div className="absolute top-2.5 right-2.5 h-2 w-2 rounded-full bg-red-500 border border-white dark:border-transparent"></div>}
                      </button>
                      <select
                        value={sortBy}
                        onChange={(e) => setSortBy(e.target.value)}
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer dark:bg-[#0d0906] dark:text-white"
                      >
                        <option value="oldest">Terlama</option>
                        <option value="newest">Terbaru</option>
                        <option value="status">Status Pengiriman</option>
                      </select>
                    </div>
                  )}

                  <button
                    onClick={() => setTheme(theme === 'dark' ? 'light' : 'dark')}
                    className="h-10 w-10 sm:h-12 sm:w-12 bg-white dark:bg-orange-500/10 border border-gray-200 dark:border-orange-500/30 rounded-[14px] sm:rounded-2xl flex items-center justify-center text-gray-700 dark:text-orange-400 shadow-sm hover:bg-gray-50 dark:hover:bg-orange-500/20 transition-colors"
                    title={theme === 'dark' ? 'Mode Terang' : 'Mode Gelap'}
                  >
                    {theme === 'dark' ? <Sun size={20} className="sm:w-5 sm:h-5" /> : <Moon size={20} className="sm:w-5 sm:h-5" />}
                  </button>

                  <button 
                    onClick={() => setIsModalOpen(true)}
                    className="bg-black dark:bg-gradient-to-br dark:from-orange-400 dark:to-yellow-500 hover:bg-gray-800 dark:hover:from-orange-500 dark:hover:to-yellow-600 text-white dark:text-black h-10 w-10 sm:h-12 sm:w-12 rounded-[14px] sm:rounded-2xl flex items-center justify-center transition-transform active:scale-95 shadow-md shrink-0 border-none"
                    title={activeTab === 'online' ? "Tambah Resi" : "Tambah Note Supplier"}
                  >
                    <Plus size={24} className="sm:w-6 sm:h-6" strokeWidth={3} />
                  </button>
                </div>
              </div>
            </div>
          </div>

          <main className="w-full relative">
            <div className="w-full pt-4 overflow-x-hidden">
              <div 
                className="flex transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)] items-start w-[200%]"
                style={{ transform: activeTab === 'online' ? 'translateX(0%)' : 'translateX(-50%)' }}
              >
                
                <section className="w-1/2">
                  <div className="max-w-2xl mx-auto px-3 sm:px-8">
                    <div className="space-y-4">
                      {displayOnlinePackages.length === 0 ? (
                        <div className="relative text-center py-20 bg-white dark:bg-[#120a07] border-2 border-dashed border-gray-200 dark:border-[#2a1b15] rounded-[32px] overflow-hidden">
                          <div className="relative z-10">
                            <div className="inline-flex items-center justify-center h-16 w-16 rounded-full bg-gray-50 dark:bg-[#1f1008] mb-4">
                              <Package size={28} className="text-gray-300 dark:text-gray-600" />
                            </div>
                            <p className="text-gray-500 dark:text-gray-400 font-semibold mb-2">
                              {sourceOnlinePackages.length === 0 && allOnlinePackages.length === 0 
                                ? "Belum ada paket yang dilacak." 
                                : sourceOnlinePackages.length === 0 && currentView === 'riwayat'
                                ? "Belum ada riwayat paket yang tiba."
                                : sourceOnlinePackages.length === 0 && currentView === 'aktif'
                                ? "Semua paket Anda sudah tiba!"
                                : "Paket tidak ditemukan."}
                            </p>
                            {sourceOnlinePackages.length === 0 && currentView === 'aktif' && allOnlinePackages.length === 0 && (
                              <button onClick={() => setIsModalOpen(true)} className="text-black dark:text-orange-500 font-bold text-sm hover:underline">
                                Tekan tombol + untuk menambah
                              </button>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div>
                          {displayOnlinePackages.map(pkg => (
                            <PackageCapsule 
                              key={pkg.awb} 
                              pkg={pkg} 
                              onRemove={requestRemovePackage}
                              onEdit={requestEditPackage}
                              onRequestMarkDelivered={requestMarkDelivered}
                              onUndoDelivered={undoSupplierDelivered}
                              isExpanded={expandedAwb === pkg.awb}
                              onToggleExpand={() => setExpandedAwb(expandedAwb === pkg.awb ? null : pkg.awb)}
                              currentView={currentView}
                              deliveringAwb={deliveringAwb}
                            />
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </section>

                <section className="w-1/2">
                  <div className="max-w-2xl mx-auto px-3 sm:px-8">
                    <div className="space-y-4">
                      {displaySupplierPackages.length === 0 ? (
                        <div className="relative text-center py-20 bg-white dark:bg-[#120a07] border-2 border-dashed border-gray-200 dark:border-[#2a1b15] rounded-[32px] overflow-hidden">
                          <div className="relative z-10">
                            <div className="inline-flex items-center justify-center h-16 w-16 rounded-full bg-gray-50 dark:bg-[#1f1008] mb-4">
                              <Truck size={28} className="text-gray-300 dark:text-gray-600" />
                            </div>
                            <p className="text-gray-500 dark:text-gray-400 font-semibold mb-2">
                              {sourceSupplierPackages.length === 0 && allSupplierPackages.length === 0 
                                ? "Belum ada pesanan supplier yang dicatat." 
                                : sourceSupplierPackages.length === 0 && currentView === 'riwayat'
                                ? "Belum ada riwayat supplier yang tiba."
                                : sourceSupplierPackages.length === 0 && currentView === 'aktif'
                                ? "Semua pesanan supplier Anda sudah tiba!"
                                : "Pesanan supplier tidak ditemukan."}
                            </p>
                            {sourceSupplierPackages.length === 0 && currentView === 'aktif' && allSupplierPackages.length === 0 && (
                              <button onClick={() => setIsModalOpen(true)} className="text-black dark:text-orange-500 font-bold text-sm hover:underline">
                                Tekan tombol + untuk menambah
                              </button>
                            )}
                          </div>
                        </div>
                      ) : (
                        <div>
                          {displaySupplierPackages.map(pkg => (
                            <PackageCapsule 
                              key={pkg.awb} 
                              pkg={pkg} 
                              onRemove={requestRemovePackage}
                              onEdit={requestEditPackage}
                              onRequestMarkDelivered={requestMarkDelivered}
                              onUndoDelivered={undoSupplierDelivered}
                              isExpanded={expandedAwb === pkg.awb}
                              onToggleExpand={() => setExpandedAwb(expandedAwb === pkg.awb ? null : pkg.awb)}
                              currentView={currentView}
                              deliveringAwb={deliveringAwb}
                            />
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </section>

              </div>
            </div>
          </main>
          
          <footer className="mt-16 mb-8 flex flex-col items-center justify-center gap-10">

          </footer>

          {isModalOpen && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-[999] flex items-end sm:items-center justify-center sm:p-4"
              onClick={() => setIsModalOpen(false)}
            >
              <div 
                className="relative bg-white dark:bg-[#130d0a] dark:border dark:border-[#2a1b15] rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10 px-6 py-5 border-b border-gray-100 dark:border-[#2a1b15] flex justify-between items-center bg-white dark:bg-transparent">
                  <h3 className="font-bold text-xl text-gray-900 dark:text-white tracking-tight">
                    {activeTab === 'online' ? 'Lacak Resi Baru' : 'Note Supplier'}
                  </h3>
                  <button onClick={() => setIsModalOpen(false)} className="p-2 -mr-2 text-gray-400 hover:text-black dark:text-orange-400 dark:hover:text-orange-300 hover:bg-gray-100 dark:hover:bg-orange-500/20 rounded-full transition-colors bg-gray-50 dark:bg-orange-500/10">
                    <X size={20} strokeWidth={3} />
                  </button>
                </div>
                
                <div className="relative z-10 p-6 max-h-[75vh] overflow-y-auto">
                  {activeTab === 'online' ? (
                    <form onSubmit={handleAddPackage} className="flex flex-col gap-5">
                      <div className="space-y-5">
                        <div className="relative">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nomor Resi</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <Search size={20} />
                            </div>
                            <input
                              type="text"
                              value={inputValue}
                              onChange={(e) => setInputValue(e.target.value)}
                              placeholder="Contoh: JP8391283..."
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-mono font-medium text-sm sm:text-base"
                              required
                              autoFocus
                            />
                          </div>
                        </div>

                        <div>
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Pilih Kurir</label>
                          <select
                            value={selectedCourier}
                            onChange={(e) => setSelectedCourier(e.target.value)}
                            className="w-full px-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black outline-none text-gray-900 dark:text-white appearance-none cursor-pointer font-medium text-sm sm:text-base"
                            style={{ backgroundImage: theme === 'dark' ? `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")` : `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23000' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right 1rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.2em 1.2em' }}
                          >
                            {COURIERS.map(c => (
                              <option key={c.id} value={c.id} className="dark:bg-[#0a0503] dark:text-white">{c.name}</option>
                            ))}
                          </select>
                        </div>

                        <div>
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Barang (Opsional)</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <Package size={20} />
                            </div>
                            <input
                              type="text"
                              value={itemName}
                              onChange={(e) => setItemName(e.target.value)}
                              placeholder="Contoh: Sepatu Sneakers"
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                            />
                          </div>
                        </div>
                      </div>

                      {error && (
                        <div className="flex items-start gap-2 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 p-4 rounded-2xl text-sm border border-red-100 dark:border-red-800/50 font-medium">
                          <AlertCircle size={18} className="shrink-0 mt-0.5" />
                          {error}
                        </div>
                      )}

                      <div className="pt-2 mt-2">
                        <button
                          type="submit"
                          disabled={isLoading || !user}
                          className={`w-full py-4 rounded-2xl font-bold transition-transform active:scale-[0.98] shadow-lg ${
                            isLoading || !user ? 'bg-gray-400 dark:bg-orange-900/50 text-white dark:text-orange-200/50 shadow-none' : 'bg-black dark:bg-gradient-to-r dark:from-orange-500 dark:to-yellow-500 dark:text-black hover:bg-gray-800 dark:hover:opacity-90 hover:shadow-xl'
                          } flex items-center justify-center gap-2 text-base`}
                        >
                          {isLoading ? (
                            <>
                              <RefreshCw size={20} className="animate-spin" />
                              Menghubungkan ke Server...
                            </>
                          ) : (
                            <>
                              Tambah ke Pantauan
                              <Plus size={20} />
                            </>
                          )}
                        </button>
                      </div>
                    </form>
                  ) : (
                    <form onSubmit={handleAddSupplierNote} className="flex flex-col gap-5">
                      <div className="space-y-5">
                        <div className="relative">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Supplier</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <User size={20} />
                            </div>
                            <input
                              type="text"
                              value={supplierName}
                              onChange={(e) => setSupplierName(e.target.value)}
                              placeholder="Contoh: PT. Sumber Rezeki"
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                              required
                              autoFocus
                            />
                          </div>
                        </div>

                        <div className="relative">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nomor SJ (Surat Jalan)</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <FileText size={20} />
                            </div>
                            <input
                              type="text"
                              value={supplierSj}
                              onChange={(e) => setSupplierSj(e.target.value)}
                              placeholder="Contoh: SJ/2024/001..."
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-mono font-medium text-sm sm:text-base"
                            />
                          </div>
                        </div>

                        <div className="relative">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Barang / Notes</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <Package size={20} />
                            </div>
                            <input
                              type="text"
                              value={supplierNote}
                              onChange={(e) => setSupplierNote(e.target.value)}
                              placeholder="Contoh: Semen 50 Sak"
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                              required
                            />
                          </div>
                        </div>

                        <div className="relative">
