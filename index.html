                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Estimasi Tiba (Opsional)</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <Calendar size={20} />
                            </div>
                            <input
                              type="date"
                              value={supplierEta}
                              onChange={(e) => setSupplierEta(e.target.value)}
                              className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                            />
                          </div>
                        </div>
                      </div>

                      {error && (
                        <div className="flex items-start gap-2 text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30 p-4 rounded-2xl text-sm border border-red-100 dark:border-red-800/50 font-medium">
                          <AlertCircle size={18} className="shrink-0 mt-0.5" />
                          {error}
                        </div>
                      )}

                      <div className="pt-2 mt-2">
                        <button
                          type="submit"
                          disabled={isLoading || !user}
                          className={`w-full py-4 rounded-2xl font-bold transition-transform active:scale-[0.98] shadow-lg ${
                            isLoading || !user ? 'bg-gray-400 dark:bg-orange-900/50 text-white dark:text-orange-200/50 shadow-none' : 'bg-black dark:bg-gradient-to-r dark:from-orange-500 dark:to-yellow-500 dark:text-black hover:bg-gray-800 dark:hover:opacity-90 hover:shadow-xl'
                          } flex items-center justify-center gap-2 text-base`}
                        >
                          {isLoading ? (
                            <>
                              <RefreshCw size={20} className="animate-spin" />
                              Menghubungkan ke Server...
                            </>
                          ) : (
                            <>
                              Tambah Catatan
                              <Plus size={20} />
                            </>
                          )}
                        </button>
                      </div>
                    </form>
                  )}
                </div>
              </div>
            </div>
          )}

          {packageToDeliver && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-[999] flex items-center justify-center p-4"
              onClick={() => setPackageToDeliver(null)}
            >
              <div 
                className="relative bg-white dark:bg-[#130d0a] dark:border dark:border-[#2a1b15] rounded-[32px] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all animate-in zoom-in-95 duration-300 p-6 text-center"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10">
                  <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-green-100 dark:bg-green-900/30 mb-4">
                    <CheckCircle size={28} className="text-green-600 dark:text-green-500" />
                  </div>
                  <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-2">Tandai Sudah Tiba?</h3>
                  <p className="text-sm text-gray-500 dark:text-gray-400 mb-6 font-medium">
                    Apakah pesanan <strong className="text-gray-900 dark:text-white font-semibold">{packageToDeliver.itemName || packageToDeliver.awb}</strong> sudah diterima?
                  </p>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setPackageToDeliver(null)}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-gray-700 dark:text-orange-400 bg-gray-100 dark:bg-orange-500/10 hover:bg-gray-200 dark:hover:bg-orange-500/20 transition-colors"
                    >
                      Batal
                    </button>
                    <button
                      onClick={confirmMarkDelivered}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-white bg-green-600 hover:bg-green-700 dark:bg-green-600 dark:hover:bg-green-500 transition-colors shadow-lg"
                    >
                      Ya, Tiba
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {packageToDelete && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-[999] flex items-center justify-center p-4"
              onClick={() => setPackageToDelete(null)}
            >
              <div 
                className="relative bg-white dark:bg-[#130d0a] dark:border dark:border-[#2a1b15] rounded-[32px] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all animate-in zoom-in-95 duration-300 p-6 text-center"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10">
                  <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 dark:bg-red-900/30 mb-4">
                    <Trash2 size={28} className="text-red-600 dark:text-red-500" />
                  </div>
                  <h3 className="text-xl font-bold text-gray-900 dark:text-white mb-2">Hapus Resi?</h3>
                  <p className="text-sm text-gray-500 dark:text-gray-400 mb-6 font-medium">
                    Apakah Anda yakin ingin menghapus <strong className="text-gray-900 dark:text-white font-semibold">{packageToDelete.itemName || packageToDelete.awb}</strong> dari pantauan?
                  </p>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setPackageToDelete(null)}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-gray-700 dark:text-orange-400 bg-gray-100 dark:bg-orange-500/10 hover:bg-gray-200 dark:hover:bg-orange-500/20 transition-colors"
                    >
                      Batal
                    </button>
                    <button
                      onClick={confirmRemovePackage}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-white bg-red-600 hover:bg-red-700 dark:bg-red-600 dark:hover:bg-red-500 transition-colors shadow-lg"
                    >
                      Ya, Hapus
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {editingPackage && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm z-[999] flex items-center justify-center p-4"
              onClick={() => setEditingPackage(null)}
            >
              <div 
                className="relative bg-white dark:bg-[#130d0a] dark:border dark:border-[#2a1b15] rounded-[32px] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all animate-in zoom-in-95 duration-300 p-6"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10">
                  <div className="flex items-center justify-between mb-4">
                    <h3 className="text-xl font-bold text-gray-900 dark:text-white">
                      {editingPackage.type === 'supplier' ? 'Edit Note Supplier' : 'Edit Nama Barang'}
                    </h3>
                    <button onClick={() => setEditingPackage(null)} className="p-1.5 text-gray-400 hover:text-black dark:text-orange-400 dark:hover:text-orange-300 hover:bg-gray-100 dark:hover:bg-orange-500/20 rounded-full transition-colors bg-gray-50 dark:bg-orange-500/10">
                      <X size={18} strokeWidth={3} />
                    </button>
                  </div>
                  
                  <form onSubmit={confirmEditPackage}>
                    
                    {editingPackage.type === 'supplier' && (
                      <>
                        <div className="mb-4">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Supplier Baru</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <User size={20} />
                            </div>
                            <input
                              type="text"
                              value={editSupplierName}
                              onChange={(e) => setEditSupplierName(e.target.value)}
                              placeholder="Masukkan nama supplier..."
                              className="w-full pl-12 pr-4 py-3.5 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                              autoFocus
                              required
                            />
                          </div>
                        </div>
                        <div className="mb-4">
                          <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nomor SJ Baru</label>
                          <div className="relative">
                            <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                              <FileText size={20} />
                            </div>
                            <input
                              type="text"
                              value={editSupplierSj}
                              onChange={(e) => setEditSupplierSj(e.target.value)}
                              placeholder="Masukkan nomor SJ..."
                              className="w-full pl-12 pr-4 py-3.5 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-mono font-medium text-sm sm:text-base"
                            />
                          </div>
                        </div>
                      </>
                    )}

                    <div className="mb-4">
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Barang / Note Baru</label>
                      <div className="relative">
                        <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                          {editingPackage.type === 'supplier' ? <Package size={20} /> : <Edit2 size={20} />}
                        </div>
                        <input
                          type="text"
                          value={editItemName}
                          onChange={(e) => setEditItemName(e.target.value)}
                          placeholder="Masukkan nama barang..."
                          className="w-full pl-12 pr-4 py-3.5 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                          autoFocus={editingPackage.type !== 'supplier'}
                          required={editingPackage.type === 'supplier'}
                        />
                      </div>
                    </div>

                    {editingPackage.type === 'supplier' && (
                      <div className="mb-6">
                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Estimasi Tiba (Opsional)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <Calendar size={20} />
                          </div>
                          <input
                            type="date"
                            value={editSupplierEta}
                            onChange={(e) => setEditSupplierEta(e.target.value)}
                            className="w-full pl-12 pr-4 py-3.5 bg-gray-50 dark:bg-[#0a0503] border border-gray-200 dark:border-[#26150c] rounded-2xl focus:bg-white dark:focus:bg-[#1a1411] focus:ring-2 focus:ring-black dark:focus:ring-orange-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-600 font-medium text-sm sm:text-base"
                          />
                        </div>
                      </div>
                    )}
                    
                    <div className="flex gap-3 mt-6">
                      <button
                        type="button"
                        onClick={() => setEditingPackage(null)}
                        className="flex-1 py-3.5 rounded-2xl font-bold text-gray-700 dark:text-orange-400 bg-gray-100 dark:bg-orange-500/10 hover:bg-gray-200 dark:hover:bg-orange-500/20 transition-colors"
                      >
                        Batal
                      </button>
                      <button
                        type="submit"
                        className="flex-1 py-3.5 rounded-2xl font-bold text-white bg-blue-600 hover:bg-blue-700 dark:bg-gradient-to-r dark:from-orange-500 dark:to-yellow-500 dark:text-black dark:hover:opacity-90 transition-colors shadow-lg"
                      >
                        Simpan
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
