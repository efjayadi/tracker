<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YEN BANGUNAN - Tracker Pesanan</title>
  
  <!-- 1. Tailwind CSS (HARUS DIMUAT PERTAMA) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- 2. Tailwind Configuration -->
  <script>
    tailwind.config = {
      darkMode: 'class', 
    };
  </script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  
</head>
<body class="bg-[#F8FAFC] dark:bg-[#05030a] text-gray-900 dark:text-white antialiased selection:bg-black selection:text-white dark:selection:bg-white dark:selection:text-black transition-colors duration-300">
  
  <div id="root"></div>

  <!-- Script Aplikasi (Module + Babel) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Package, Truck, CheckCircle, Clock, RefreshCw, Trash2, 
      Search, AlertCircle, MapPin, X, Plus, Navigation, Filter, Moon, Sun
    } from 'https://esm.sh/lucide-react@0.263.1';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyA8LV6EQ4dxHTIIabUjiHRPFcbsvoAW6Hs",
      authDomain: "tracker-3630d.firebaseapp.com",
      projectId: "tracker-3630d",
      storageBucket: "tracker-3630d.firebasestorage.app",
      messagingSenderId: "901038407111",
      appId: "1:901038407111:web:f8479511343c5c10b4ede2",
      measurementId: "G-38YMH0TWWZ"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Gagal inisialisasi Firebase", e);
    }

    // ==========================================
    // 2. BINDERBYTE API (TRACKING)
    // ==========================================
    const COURIERS = [
      { id: 'jnt', name: 'J&T Express' },
      { id: 'jne', name: 'JNE' },
      { id: 'sicepat', name: 'SiCepat Ekspres' },
      { id: 'anteraja', name: 'AnterAja' },
      { id: 'spx', name: 'Shopee Express (SPX)' },
      { id: 'idexpress', name: 'ID Express' },
      { id: 'ninja', name: 'Ninja Xpress' }
    ];

    const BINDERBYTE_API_KEY = '6e697e720e51b107214b6fde2d467f5b7f70d644be1cb1403bcd4d9cec109ba2';

    const fetchTrackingFromAPI = async (awb, courier, itemName = '', phone = '') => {
      if (awb.length < 5) throw new Error("Nomor resi tidak valid. Minimal 5 karakter.");

      try {
        const targetUrl = `https://api.binderbyte.com/v1/track?api_key=${BINDERBYTE_API_KEY}&courier=${courier}&awb=${awb}&phone=${phone}&_t=${Date.now()}`;
        
        const proxies = [
          `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
          `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`
        ];

        let response = null;

        for (const proxyUrl of proxies) {
          try {
            const res = await fetch(proxyUrl);
            if (res.ok) { response = res; break; }
          } catch (proxyErr) {}
        }
        
        if (!response) {
          throw new Error("Gagal terhubung ke server. Pastikan internet stabil.");
        }

        const result = await response.json();

        if (result.status !== 200) {
          throw new Error(result.message || "Gagal melacak paket. Periksa kembali resi dan kurir Anda.");
        }

        const data = result.data;
        
        let mappedStatus = 'TRANSIT';
        const rawStatus = (data.summary.status || '').toUpperCase();
        if (rawStatus.includes('DELIVERED') || rawStatus.includes('SUCCESS')) mappedStatus = 'DELIVERED';
        else if (rawStatus.includes('DELIVERING') || rawStatus.includes('WITH DELIVERY COURIER')) mappedStatus = 'DELIVERING';
        else if (rawStatus.includes('PICKUP')) mappedStatus = 'PICKUP';
        else if (rawStatus === '') mappedStatus = 'PENDING';

        const timeline = (data.history || []).map((h, i) => ({
          id: i.toString() + h.date,
          description: h.desc,
          location: h.location || '',
          timestamp: h.date,
        }));

        return {
          awb: data.summary.awb,
          courier,
          itemName,
          phone,
          status: mappedStatus,
          timeline,
          addedAt: new Date().toISOString(),
          lastUpdated: new Date().toISOString()
        };

      } catch (err) {
        throw new Error(err.message || "Terjadi kesalahan jaringan.");
      }
    };

    // ==========================================
    // 3. UI COMPONENTS
    // ==========================================
    const getStatusConfig = (status) => {
      const configs = {
        'DELIVERED': { color: 'bg-black dark:bg-violet-700 text-white dark:text-white border-black dark:border-violet-700', icon: CheckCircle, label: 'Tiba' },
        'DELIVERING': { color: 'bg-gray-800 dark:bg-violet-800 text-white dark:text-white border-gray-800 dark:border-violet-800', icon: Navigation, label: 'Out for delivery' },
        'TRANSIT': { color: 'bg-gray-600 dark:bg-violet-700/30 text-white dark:text-violet-100 border-gray-600 dark:border-violet-500/50', icon: Truck, label: 'Transit' },
        'PICKUP': { color: 'bg-gray-200 dark:bg-violet-600/20 text-gray-800 dark:text-violet-300 border-gray-300 dark:border-violet-500/40', icon: Package, label: 'Picked up' },
        'PENDING': { color: 'bg-white dark:bg-[#1a162b] text-gray-600 dark:text-gray-400 border-gray-200 dark:border-[#2a2442]', icon: Clock, label: 'Pending' },
      };
      return configs[status] || configs['PENDING'];
    };

    const StatusBadge = ({ status }) => {
      const config = getStatusConfig(status);
      const Icon = config.icon;

      return (
        <span className={`flex items-center justify-center gap-0.5 px-1 py-0.5 rounded-full text-[8px] sm:text-[9px] font-medium border ${config.color} tracking-tight w-full shadow-sm`}>
          <Icon size={9} strokeWidth={2.5} className="shrink-0" />
          <span className="truncate leading-none pt-[1px]">{config.label}</span>
        </span>
      );
    };

    const getCourierStyle = (courierId) => {
      const labels = {
        'spx': 'SPX', 'jnt': 'J&T', 'sicepat': 'SiCepat', 'anteraja': 'AnterAja',
        'idexpress': 'ID', 'ninja': 'NIN', 'jne': 'JNE'
      };

      return {
        className: `w-full py-1.5 px-1 rounded-lg bg-black dark:bg-[#1f1a36] dark:border dark:border-[#2a2442] text-white flex items-center justify-center font-black text-[10px] sm:text-xs shadow-sm tracking-tight leading-none`,
        label: labels[courierId] || 'PKG'
      };
    };

    const getPackageCreationDate = (pkg) => {
      const dateString = pkg.timeline && pkg.timeline.length > 0 
        ? pkg.timeline[pkg.timeline.length - 1].timestamp 
        : pkg.addedAt;
      const parsedDate = new Date((dateString || '').replace(' ', 'T'));
      return isNaN(parsedDate.getTime()) ? new Date(pkg.addedAt).getTime() : parsedDate.getTime();
    };

    const PackageCapsule = ({ pkg, onRemove }) => {
      const [expanded, setExpanded] = useState(false);
      if (!pkg) return null;
      
      const latestEvent = pkg.timeline?.[0];
      const courierAvatar = getCourierStyle(pkg.courier);
      const courierNameFull = COURIERS.find(c => c.id === pkg.courier)?.name || pkg.courier;

      const firstEventDate = pkg.timeline && pkg.timeline.length > 0 
        ? pkg.timeline[pkg.timeline.length - 1].timestamp 
        : pkg.addedAt;

      const formatDate = (dateString) => {
        if (!dateString) return '-';
        const d = new Date(dateString.replace(' ', 'T')); 
        if (isNaN(d.getTime())) return dateString;
        return new Intl.DateTimeFormat('id-ID', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        }).format(d);
      };

      const displayTitle = pkg.itemName ? pkg.itemName : `Paket ${courierAvatar.label}`;

      return (
        <div className="relative bg-white dark:bg-[#131024] rounded-[24px] shadow-sm border border-gray-100 dark:border-[#231d3b] overflow-hidden mb-2">
          <div className="relative z-10">
            <div 
              className="px-3 py-2.5 sm:px-4 sm:py-3 cursor-pointer flex flex-row items-stretch justify-between gap-3"
              onClick={() => setExpanded(!expanded)}
            >
              <div className="flex flex-col items-stretch justify-center gap-1 shrink-0 w-[60px] sm:w-[68px]">
                <div className={courierAvatar.className}>
                  <span className="truncate">{courierAvatar.label}</span>
                </div>
                <StatusBadge status={pkg.status} />
              </div>

              <div className="flex-1 min-w-0 flex flex-col justify-center">
                <span className="text-[8px] sm:text-[9px] text-gray-400 dark:text-gray-400/80 font-medium mb-0.5 tracking-wider uppercase">
                  {formatDate(firstEventDate)}
                </span>
                <h3 className="font-black text-gray-900 dark:text-white text-sm sm:text-base leading-tight break-words whitespace-normal mb-1">
                  {displayTitle}
                </h3>
                <p className="text-xs text-gray-600 dark:text-gray-400 line-clamp-2 leading-snug font-medium">
                  {latestEvent?.description || 'Status belum diperbarui'}
                </p>
              </div>

              <div className="flex flex-col items-center justify-center border-l border-gray-100 dark:border-[#231d3b] pl-2 sm:pl-3 shrink-0">
                <button 
                  onClick={(e) => { e.stopPropagation(); onRemove(pkg); }}
                  className="p-2 rounded-xl text-gray-900 dark:text-gray-400 hover:text-white dark:hover:text-white hover:bg-red-500 dark:hover:bg-red-600 transition-colors"
                  title="Hapus Resi"
                >
                  <Trash2 size={16} />
                </button>
              </div>
            </div>

            {expanded && (
              <div className="bg-gray-50 dark:bg-[#0a0714] p-4 sm:p-5 border-t border-gray-100 dark:border-[#231d3b]">
                <div className="mb-5 bg-white dark:bg-[#131024] p-3 rounded-xl border border-gray-200 dark:border-[#231d3b] flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                  <div>
                    <p className="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wider mb-0.5">Nomor Resi</p>
                    <p className="font-mono text-sm font-bold text-gray-900 dark:text-white">{pkg.awb}</p>
                  </div>
                  <div className="sm:text-right">
                    <p className="text-xs text-gray-500 dark:text-gray-400 font-semibold uppercase tracking-wider mb-0.5">Kurir</p>
                    <p className="text-sm font-bold text-gray-900 dark:text-white">{courierNameFull}</p>
                  </div>
                </div>

                <h4 className="text-xs font-bold text-gray-400 dark:text-gray-500 mb-4 tracking-wider uppercase">Riwayat Perjalanan</h4>
                <div className="relative border-l-2 border-gray-200 dark:border-[#231d3b] ml-3 space-y-6 pb-2">
                  {(pkg.timeline || []).map((event, index) => (
                    <div key={event.id || index} className="relative pl-6">
                      <div className={`absolute -left-[9px] top-1 h-4 w-4 rounded-full border-2 ${index === 0 ? 'bg-black dark:bg-white ring-4 ring-gray-200 dark:ring-[#231d3b] border-white dark:border-[#131024]' : 'bg-gray-300 dark:bg-[#231d3b] border-gray-50 dark:border-[#0a0714]'}`}></div>
                      
                      <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-1.5">
                        <div className="pr-4">
                          <p className={`text-sm leading-relaxed ${index === 0 ? 'font-bold text-gray-900 dark:text-white' : 'text-gray-600 dark:text-gray-300 font-medium'}`}>
                            {event.description}
                          </p>
                          {event.location && (
                            <p className="text-xs font-bold text-black dark:text-gray-400 mt-1 flex items-center gap-1">
                              <MapPin size={12} /> {event.location}
                            </p>
                          )}
                        </div>
                        <span className="text-[11px] font-semibold text-gray-400 dark:text-gray-500 whitespace-nowrap mt-1 sm:mt-0">
                          {formatDate(event.timestamp)}
                        </span>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // ==========================================
    // 4. MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [packages, setPackages] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [itemName, setItemName] = useState('');
      const [phone, setPhone] = useState('');
      const [selectedCourier, setSelectedCourier] = useState(COURIERS[0].id);
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [user, setUser] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isJneModalOpen, setIsJneModalOpen] = useState(false);
      const [jneError, setJneError] = useState('');
      
      const [searchQuery, setSearchQuery] = useState('');
      const [sortBy, setSortBy] = useState('oldest');
      const [packageToDelete, setPackageToDelete] = useState(null);
      const [isSearchActive, setIsSearchActive] = useState(false);
      const [isScrolled, setIsScrolled] = useState(false);
      
      const [isAutoSyncing, setIsAutoSyncing] = useState(false);
      const processedAutoRefresh = useRef(new Set());

      // Theme State (Dark Mode) - Default is strictly 'light'
      const [theme, setTheme] = useState(() => {
        if (typeof window !== 'undefined') {
          return localStorage.getItem('theme') || 'light';
        }
        return 'light';
      });

      useEffect(() => {
        const root = document.documentElement;
        if (theme === 'dark') {
          root.classList.add('dark');
        } else {
          root.classList.remove('dark');
        }
        localStorage.setItem('theme', theme);
      }, [theme]);

      // Scroll Event Listener
      useEffect(() => {
        const handleScroll = () => {
          setIsScrolled(window.scrollY > 90);
        };
        window.addEventListener('scroll', handleScroll, { passive: true });
        return () => window.removeEventListener('scroll', handleScroll);
      }, []);

      // Firebase Auth
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try { await signInAnonymously(auth); } 
          catch (e) { console.error("Auth init error:", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // Load & Sync from Firestore
      useEffect(() => {
        if (!user || !db) return;
        const publicDataRef = collection(db, 'tracked_packages');
        
        const unsubscribe = onSnapshot(publicDataRef, (snapshot) => {
          const pkgs = [];
          snapshot.forEach(doc => pkgs.push(doc.data()));
          pkgs.sort((a, b) => getPackageCreationDate(a) - getPackageCreationDate(b));
          setPackages(pkgs);
        }, (error) => {
          console.error("Snapshot error:", error);
        });

        return () => unsubscribe();
      }, [user]);

      // Smart Auto Refresh (Background Data Check)
      useEffect(() => {
        if (!user || !db || packages.length === 0) return;

        const performAutoRefresh = async () => {
          const now = new Date().getTime();
          const AUTO_REFRESH_INTERVAL = 2 * 60 * 60 * 1000; // 2 Jam

          const packagesToRefresh = packages.filter(pkg => {
            if (pkg.status === 'DELIVERED') return false; 
            if (processedAutoRefresh.current.has(pkg.awb)) return false; 
            const lastUpdatedTime = new Date(pkg.lastUpdated || pkg.addedAt).getTime();
            return (now - lastUpdatedTime) > AUTO_REFRESH_INTERVAL;
          });

          if (packagesToRefresh.length > 0) {
            setIsAutoSyncing(true);
            for (const pkg of packagesToRefresh) {
              try {
                processedAutoRefresh.current.add(pkg.awb); 
                const updatedData = await fetchTrackingFromAPI(pkg.awb, pkg.courier, pkg.itemName, pkg.phone);
                await setDoc(doc(db, 'tracked_packages', pkg.awb), updatedData, { merge: true });
              } catch (err) {}
              await new Promise(resolve => setTimeout(resolve, 1000));
            }
            setIsAutoSyncing(false);
          }
        };

        performAutoRefresh();
        const intervalId = setInterval(performAutoRefresh, 5 * 60 * 1000);
        return () => clearInterval(intervalId);
      }, [packages, user, db]);

      const performTracking = async (awbToTrack, courierToTrack, itemNameToTrack, phoneToTrack) => {
        setIsLoading(true);
        setError('');
        setJneError('');

        try {
          const newData = await fetchTrackingFromAPI(awbToTrack, courierToTrack, itemNameToTrack, phoneToTrack);
          const docRef = doc(db, 'tracked_packages', newData.awb);
          await setDoc(docRef, newData);
          
          setInputValue('');
          setItemName('');
          setPhone('');
          setIsModalOpen(false);
          setIsJneModalOpen(false);
        } catch (err) {
          if (isJneModalOpen) setJneError(err.message || 'Gagal melacak resi. Silakan coba lagi.');
          else setError(err.message || 'Gagal melacak resi. Silakan coba lagi.');
        } finally {
          setIsLoading(false);
        }
      };

      const handleAddPackage = async (e) => {
        e.preventDefault();
        if (!inputValue.trim() || !user || !db) return;

        if (packages.some(p => p.awb.toLowerCase() === inputValue.toLowerCase())) {
          setError('Nomor resi ini sudah ada di daftar pantauan Anda.');
          return;
        }

        if (selectedCourier === 'jne') {
          setIsModalOpen(false);
          setIsJneModalOpen(true);
          return;
        }

        await performTracking(inputValue.trim().toUpperCase(), selectedCourier, itemName.trim(), '');
      };

      const handleJneSubmit = async (e) => {
        e.preventDefault();
        if (!phone.trim()) {
          setJneError('Digit No. HP wajib diisi untuk JNE.');
          return;
        }
        await performTracking(inputValue.trim().toUpperCase(), 'jne', itemName.trim(), phone.trim());
      };

      const requestRemovePackage = (pkg) => setPackageToDelete(pkg);

      const confirmRemovePackage = async () => {
        if (!user || !db || !packageToDelete) return;
        try {
          await deleteDoc(doc(db, 'tracked_packages', packageToDelete.awb));
          setPackageToDelete(null);
        } catch (err) { console.error("Failed to remove package", err); }
      };

      const filteredAndSortedPackages = packages
        .filter(pkg => {
          const query = searchQuery.toLowerCase();
          return (
            pkg.awb.toLowerCase().includes(query) ||
            (pkg.itemName && pkg.itemName.toLowerCase().includes(query)) ||
            (pkg.courier && pkg.courier.toLowerCase().includes(query))
          );
        })
        .sort((a, b) => {
          if (sortBy === 'newest') return getPackageCreationDate(b) - getPackageCreationDate(a);
          if (sortBy === 'oldest') return getPackageCreationDate(a) - getPackageCreationDate(b);
          if (sortBy === 'status') {
            const statusOrder = { 'PENDING': 1, 'PICKUP': 2, 'TRANSIT': 3, 'DELIVERING': 4, 'DELIVERED': 5 };
            return (statusOrder[a.status] || 99) - (statusOrder[b.status] || 99);
          }
          return 0;
        });

      return (
        <div className="min-h-screen font-sans relative pb-20">
          
          {/* Latar Belakang Aurora Ringan (Statis) */}
          <div className="fixed inset-0 z-[-1] hidden dark:block bg-[#05030a] pointer-events-none">
            <div className="absolute top-[-10%] left-[-10%] w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-violet-900/10 blur-[80px] rounded-full"></div>
            <div className="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] max-w-[400px] max-h-[400px] bg-blue-900/10 blur-[80px] rounded-full"></div>
          </div>

          {/* Normal Header: Title */}
          <div className="pt-6 sm:pt-8 px-3 sm:px-8">
            <div className="max-w-2xl mx-auto text-center mb-5 sm:mb-7">
              <h1 
                className="text-5xl sm:text-6xl mb-1 tracking-wide text-gray-900 dark:text-white" 
                style={{ fontFamily: "'Bebas Neue', sans-serif" }}
              >
                YEN BANGUNAN
              </h1>
              <p className="text-gray-500 dark:text-gray-400 uppercase tracking-[0.2em] text-[10px] sm:text-xs font-bold">
                Tracker Pesanan Online
              </p>
            </div>
          </div>

          {/* Sticky Toolbar: Pantauan Aktif & Tombol Aksi */}
          <div className={`sticky top-0 z-40 px-3 sm:px-8 pt-2 pb-3 transition-colors duration-300 ${
            isScrolled ? 'backdrop-blur-md bg-white/90 dark:bg-[#05030a]/80 border-b border-gray-200 dark:border-white/10' : 'bg-transparent'
          }`}>
            <div className="max-w-2xl mx-auto relative z-10">
              <div className="flex items-center justify-between px-1 h-11 sm:h-12">
                
                {/* Bagian Kiri: Search Bar ATAU Judul Dinamis */}
                {isSearchActive ? (
                  <div className="flex-1 relative flex items-center h-full transition-all animate-in fade-in slide-in-from-left-4 duration-300 mr-2">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                      <Search size={18} />
                    </div>
                    <input
                      type="text"
                      autoFocus
                      placeholder="Cari resi, nama, kurir..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-10 py-0 h-full bg-white dark:bg-[#131024] border border-gray-200 dark:border-[#231d3b] rounded-2xl focus:ring-2 focus:ring-black dark:focus:ring-violet-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white font-medium text-sm shadow-sm placeholder-gray-400 dark:placeholder-gray-500"
                    />
                    <button
                      onClick={() => { setIsSearchActive(false); setSearchQuery(''); }}
                      className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-900 dark:hover:text-white"
                    >
                      <X size={18} />
                    </button>
                  </div>
                ) : (
                  <div className="flex-1 relative flex items-center h-full animate-in fade-in slide-in-from-right-4 duration-300">
                    
                    {/* Teks "Pantauan Aktif" */}
                    <h2 className={`absolute left-0 text-xl sm:text-2xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-2 transition-all duration-300 origin-left ${
                      isScrolled ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100'
                    }`}>
                      Pantauan Aktif 
                      <span className="bg-gray-200 dark:bg-[#131024] text-gray-600 dark:text-white px-2.5 py-0.5 rounded-full text-sm font-bold flex items-center gap-1.5 dark:border dark:border-[#231d3b]">
                        {packages.length}
                        {isAutoSyncing && <RefreshCw size={12} className="animate-spin text-gray-400 dark:text-gray-400" />}
                      </span>
                    </h2>

                    {/* Teks "YEN BANGUNAN" (Muncul saat di-scroll) */}
                    <h2 
                      className={`absolute left-0 text-2xl sm:text-3xl text-gray-900 dark:text-white tracking-wide transition-all duration-300 origin-left flex items-center gap-2 ${
                        isScrolled ? 'opacity-100 scale-100' : 'opacity-0 scale-105 pointer-events-none'
                      }`} 
                      style={{ fontFamily: "'Bebas Neue', sans-serif", paddingTop: '2px' }}
                    >
                      YEN BANGUNAN
                      <span className="bg-gray-200 dark:bg-[#131024] text-gray-600 dark:text-white px-2.5 py-0.5 rounded-full text-sm font-sans font-bold tracking-normal flex items-center gap-1.5 dark:border dark:border-[#231d3b]" style={{ paddingTop: '0' }}>
                        {packages.length}
                        {isAutoSyncing && <RefreshCw size={12} className="animate-spin text-gray-400 dark:text-gray-400" />}
                      </span>
                    </h2>

                  </div>
                )}

                {/* Bagian Kanan: Ikon */}
                <div className="flex items-center gap-2 shrink-0">
                  
                  {!isSearchActive && packages.length > 0 && (
                    <button 
                      onClick={() => setIsSearchActive(true)}
                      className="h-11 w-11 sm:h-12 sm:w-12 bg-white dark:bg-[#131024] border border-gray-200 dark:border-[#231d3b] rounded-2xl flex items-center justify-center text-gray-700 dark:text-white shadow-sm hover:bg-gray-50 dark:hover:bg-[#1a162b] transition-colors"
                    >
                      <Search size={20} />
                    </button>
                  )}

                  {packages.length > 0 && (
                    <div className="relative">
                      <button 
                        className="h-11 w-11 sm:h-12 sm:w-12 bg-white dark:bg-[#131024] border border-gray-200 dark:border-[#231d3b] rounded-2xl flex items-center justify-center text-gray-700 dark:text-white shadow-sm hover:bg-gray-50 dark:hover:bg-[#1a162b] transition-colors"
                      >
                        <Filter size={20} />
                        {sortBy !== 'oldest' && <div className="absolute top-2.5 right-2.5 h-2 w-2 rounded-full bg-red-500 border border-white dark:border-transparent"></div>}
                      </button>
                      <select
                        value={sortBy}
                        onChange={(e) => setSortBy(e.target.value)}
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer dark:bg-[#0a0714] dark:text-white"
                      >
                        <option value="oldest">Terlama</option>
                        <option value="newest">Terbaru</option>
                        <option value="status">Status Pengiriman</option>
                      </select>
                    </div>
                  )}

                  <button 
                    onClick={() => setIsModalOpen(true)}
                    className="bg-black dark:bg-white hover:bg-gray-800 dark:hover:bg-gray-200 text-white dark:text-black h-11 w-11 sm:h-12 sm:w-12 rounded-2xl flex items-center justify-center transition-transform active:scale-95 shadow-md shrink-0"
                  >
                    <Plus size={24} strokeWidth={3} />
                  </button>
                </div>
              </div>
            </div>
          </div>

          {/* Wrapper Daftar Resi */}
          <div className="max-w-2xl mx-auto px-3 sm:px-8 pt-2">
            
            <div className="space-y-4">
              {filteredAndSortedPackages.length === 0 ? (
                <div className="relative text-center py-20 bg-white dark:bg-[#131024] border-2 border-dashed border-gray-200 dark:border-[#231d3b] rounded-[32px] overflow-hidden">
                  <div className="relative z-10">
                    <div className="inline-flex items-center justify-center h-16 w-16 rounded-full bg-gray-50 dark:bg-[#1f1a36] mb-4">
                      <Package size={28} className="text-gray-300 dark:text-gray-500" />
                    </div>
                    <p className="text-gray-500 dark:text-gray-400 font-semibold mb-2">
                      {packages.length === 0 ? "Belum ada paket yang dilacak." : "Paket tidak ditemukan."}
                    </p>
                    {packages.length === 0 && (
                      <button onClick={() => setIsModalOpen(true)} className="text-black dark:text-white font-black text-sm hover:underline">
                        Tekan tombol + untuk menambah
                      </button>
                    )}
                  </div>
                </div>
              ) : (
                <div>
                  {filteredAndSortedPackages.map(pkg => (
                    <PackageCapsule 
                      key={pkg.awb} 
                      pkg={pkg} 
                      onRemove={requestRemovePackage}
                    />
                  ))}
                </div>
              )}
            </div>
            
            <div className="mt-12 mb-8 flex flex-col items-center justify-center gap-6 text-[10px] text-gray-400 dark:text-gray-500 font-medium">
              <p>Dibuat oleh Fajar Jayadi</p>
              
              {/* TOMBOL TEMA (FULL WIDTH SLIDING SWITCH - BULAT PENUH) */}
              <div className="w-full relative p-1.5 bg-gray-100 dark:bg-[#131024] rounded-full flex items-center border border-gray-200 dark:border-[#231d3b]">
                {/* Latar Belakang Geser (Pill) */}
                <div 
                  className="absolute top-1.5 bottom-1.5 w-[calc(50%-6px)] bg-white dark:bg-[#1f1a36] border border-gray-200 dark:border-[#2a2442] rounded-full shadow-sm dark:shadow-md transition-all duration-300 ease-out"
                  style={{ left: theme === 'dark' ? 'calc(50% + 3px)' : '6px' }}
                ></div>
                
                <button 
                  onClick={() => setTheme('light')}
                  className={`flex-1 flex items-center justify-center gap-2 py-3.5 z-10 text-[11px] uppercase tracking-wider font-bold transition-colors duration-300 ${theme === 'light' ? 'text-black' : 'text-gray-500 hover:text-gray-300'}`}
                >
                  <Sun size={14} strokeWidth={2.5} /> Mode Terang
                </button>
                
                <button 
                  onClick={() => setTheme('dark')}
                  className={`flex-1 flex items-center justify-center gap-2 py-3.5 z-10 text-[11px] uppercase tracking-wider font-bold transition-colors duration-300 ${theme === 'dark' ? 'text-white' : 'text-gray-400 hover:text-gray-300'}`}
                >
                  <Moon size={14} strokeWidth={2.5} /> Mode Gelap
                </button>
              </div>

            </div>
          </div>

          {/* MAIN ADD PACKAGE MODAL */}
          {isModalOpen && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4"
              onClick={() => setIsModalOpen(false)}
            >
              <div 
                className="relative bg-white dark:bg-[#131024] dark:border dark:border-[#231d3b] rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10 px-6 py-5 border-b border-gray-100 dark:border-[#231d3b] flex justify-between items-center bg-white dark:bg-transparent">
                  <h3 className="font-black text-xl text-gray-900 dark:text-white tracking-tight">Lacak Resi Baru</h3>
                  <button onClick={() => setIsModalOpen(false)} className="p-2 -mr-2 text-gray-400 hover:text-black dark:hover:text-white hover:bg-gray-100 dark:hover:bg-[#1f1a36] rounded-full transition-colors bg-gray-50 dark:bg-[#0a0714]">
                    <X size={20} strokeWidth={3} />
                  </button>
                </div>
                
                <div className="relative z-10 p-6">
                  <form onSubmit={handleAddPackage} className="flex flex-col gap-5">
                    <div className="space-y-5">
                      <div className="relative">
                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1">Nomor Resi</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <Search size={20} />
                          </div>
                          <input
                            type="text"
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            placeholder="Contoh: JP8391283..."
                            className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0714] border border-gray-200 dark:border-[#231d3b] rounded-2xl focus:bg-white dark:focus:bg-[#1a162b] focus:ring-2 focus:ring-black dark:focus:ring-violet-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 font-mono font-bold text-sm sm:text-base"
                            required
                            autoFocus
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1">Pilih Kurir</label>
                        <select
                          value={selectedCourier}
                          onChange={(e) => setSelectedCourier(e.target.value)}
                          className="w-full px-4 py-4 bg-gray-50 dark:bg-[#0a0714] border border-gray-200 dark:border-[#231d3b] rounded-2xl focus:bg-white dark:focus:bg-[#1a162b] focus:ring-2 focus:ring-black dark:focus:ring-violet-500 focus:border-black outline-none text-gray-900 dark:text-white appearance-none cursor-pointer font-bold text-sm sm:text-base"
                          style={{ backgroundImage: theme === 'dark' ? `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23fff' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")` : `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23000' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right 1rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.2em 1.2em' }}
                        >
                          {COURIERS.map(c => (
                            <option key={c.id} value={c.id} className="dark:bg-[#0a0714] dark:text-white">{c.name}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1">Nama Barang (Opsional)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <Package size={20} />
                          </div>
                          <input
                            type="text"
                            value={itemName}
                            onChange={(e) => setItemName(e.target.value)}
                            placeholder="Contoh: Sepatu Sneakers"
                            className="w-full pl-12 pr-4 py-4 bg-gray-50 dark:bg-[#0a0714] border border-gray-200 dark:border-[#231d3b] rounded-2xl focus:bg-white dark:focus:bg-[#1a162b] focus:ring-2 focus:ring-black dark:focus:ring-violet-500 focus:border-black dark:focus:border-transparent outline-none text-gray-900 dark:text-white placeholder-gray-400 font-bold text-sm sm:text-base"
                          />
                        </div>
                      </div>
                    </div>

                    {error && (
                      <div className="flex items-start gap-2 text-red-600 dark:text-red-300 bg-red-50 dark:bg-red-900/30 p-4 rounded-2xl text-sm border border-red-100 dark:border-red-800/50 font-medium">
                        <AlertCircle size={18} className="shrink-0 mt-0.5" />
                        {error}
                      </div>
                    )}

                    <div className="pt-2 mt-2">
                      <button
                        type="submit"
                        disabled={isLoading || !user}
                        className={`w-full py-4 rounded-2xl font-black transition-transform active:scale-[0.98] shadow-lg ${
                          isLoading || !user ? 'bg-gray-400 dark:bg-gray-700 text-white dark:text-gray-400 shadow-none' : 'bg-black dark:bg-violet-600 text-white hover:bg-gray-800 dark:hover:bg-violet-700 hover:shadow-xl'
                        } flex items-center justify-center gap-2 text-base`}
                      >
                        {isLoading ? (
                          <>
                            <RefreshCw size={20} className="animate-spin" />
                            Mencari Data...
                          </>
                        ) : (
                          <>
                            Tambah ke Pantauan
                            <Plus size={20} />
                          </>
                        )}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* JNE VERIFICATION MODAL */}
          {isJneModalOpen && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/70 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4"
              onClick={() => { setIsJneModalOpen(false); setJneError(''); }}
            >
              <div 
                className="relative bg-white dark:bg-[#131024] dark:border dark:border-[#231d3b] rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10 px-6 py-5 border-b border-gray-100 dark:border-[#231d3b] flex justify-between items-center bg-white dark:bg-transparent">
                  <h3 className="font-black text-xl text-gray-900 dark:text-white tracking-tight">Verifikasi JNE</h3>
                  <button onClick={() => { setIsJneModalOpen(false); setJneError(''); }} className="p-2 -mr-2 text-gray-400 hover:text-black dark:hover:text-white hover:bg-gray-100 dark:hover:bg-[#1f1a36] rounded-full transition-colors bg-gray-50 dark:bg-[#0a0714]">
                    <X size={20} strokeWidth={3} />
                  </button>
                </div>
                
                <div className="relative z-10 p-6">
                  <div className="bg-blue-50 dark:bg-violet-900/20 border border-blue-100 dark:border-violet-800/30 rounded-2xl p-4 mb-6">
                    <p className="text-sm text-blue-900 dark:text-violet-200 font-medium leading-relaxed">
                      Kurir JNE mewajibkan verifikasi demi keamanan. Masukkan <strong>4 - 5 digit terakhir</strong> dari nomor HP si penerima paket.
                    </p>
                  </div>
                  
                  <form onSubmit={handleJneSubmit} className="flex flex-col gap-5">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2 ml-1">Digit Terakhir HP Penerima</label>
                      <input
                        type="number"
                        value={phone}
                        onChange={(e) => setPhone(e.target.value)}
                        placeholder="Contoh: 8989"
                        className="w-full px-5 py-4 bg-gray-50 dark:bg-[#0a0714] border border-gray-200 dark:border-[#231d3b] rounded-2xl focus:bg-white dark:focus:bg-[#1a162b] focus:ring-2 focus:ring-black dark:focus:ring-violet-500 focus:border-black outline-none text-gray-900 dark:text-white placeholder-gray-400 font-mono font-bold text-lg text-center tracking-widest"
                        required
                        autoFocus
                      />
                    </div>

                    {jneError && (
                      <div className="flex items-start gap-2 text-red-600 dark:text-red-300 bg-red-50 dark:bg-red-900/30 p-4 rounded-2xl text-sm border border-red-100 dark:border-red-800/50 font-medium">
                        <AlertCircle size={18} className="shrink-0 mt-0.5" />
                        {jneError}
                      </div>
                    )}

                    <div className="pt-2 flex gap-3">
                      <button
                        type="button"
                        onClick={() => {
                          setIsJneModalOpen(false);
                          setIsModalOpen(true);
                          setJneError('');
                        }}
                        className="flex-1 py-4 rounded-2xl font-black text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-[#1f1a36] hover:bg-gray-200 dark:hover:bg-[#2a2442] transition-colors"
                      >
                        Kembali
                      </button>
                      <button
                        type="submit"
                        disabled={isLoading || !user}
                        className={`flex-[1.5] py-4 rounded-2xl font-black text-white transition-transform active:scale-[0.98] ${
                          isLoading || !user ? 'bg-gray-400 dark:bg-gray-700 text-white/50' : 'bg-[#004A98] dark:bg-violet-600 hover:bg-blue-900 dark:hover:bg-violet-700 shadow-lg'
                        } flex items-center justify-center gap-2`}
                      >
                        {isLoading ? (
                          <RefreshCw size={20} className="animate-spin" />
                        ) : (
                          <>
                            Verifikasi <CheckCircle size={20} />
                          </>
                        )}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* DELETE CONFIRMATION MODAL */}
          {packageToDelete && (
            <div 
              className="fixed inset-0 bg-black/60 dark:bg-black/70 backdrop-blur-sm z-50 flex items-center justify-center p-4"
              onClick={() => setPackageToDelete(null)}
            >
              <div 
                className="relative bg-white dark:bg-[#131024] dark:border dark:border-[#231d3b] rounded-[32px] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all animate-in zoom-in-95 duration-300 p-6 text-center"
                onClick={(e) => e.stopPropagation()}
              >
                <div className="relative z-10">
                  <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 dark:bg-red-900/30 mb-4">
                    <Trash2 size={28} className="text-red-600 dark:text-red-400" />
                  </div>
                  <h3 className="text-xl font-black text-gray-900 dark:text-white mb-2">Hapus Resi?</h3>
                  <p className="text-sm text-gray-500 dark:text-gray-400 mb-6 font-medium">
                    Apakah Anda yakin ingin menghapus <strong className="text-gray-900 dark:text-white">{packageToDelete.itemName || packageToDelete.awb}</strong> dari pantauan?
                  </p>
                  <div className="flex gap-3">
                    <button
                      onClick={() => setPackageToDelete(null)}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-gray-700 dark:text-gray-300 bg-gray-100 dark:bg-[#1f1a36] hover:bg-gray-200 dark:hover:bg-[#2a2442] transition-colors"
                    >
                      Batal
                    </button>
                    <button
                      onClick={confirmRemovePackage}
                      className="flex-1 py-3.5 rounded-2xl font-bold text-white bg-red-600 hover:bg-red-700 dark:bg-red-600 dark:hover:bg-red-700 transition-colors shadow-lg"
                    >
                      Ya, Hapus
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
