<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>YEN BANGUNAN - Tracker Pesanan</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Babel Standalone -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] antialiased selection:bg-black selection:text-white">
  
  <div id="root"></div>

  <!-- Script Aplikasi (Module + Babel) -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect } from 'https://esm.sh/react@18.2.0';
    import { createRoot } from 'https://esm.sh/react-dom@18.2.0/client';
    import { 
      Package, Truck, CheckCircle, Clock, RefreshCw, Trash2, 
      ChevronDown, ChevronUp, Search, AlertCircle, MapPin, X, Plus, Navigation, Filter
    } from 'https://esm.sh/lucide-react@0.263.1';
    
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // ==========================================
    // 1. FIREBASE CONFIGURATION
    // ==========================================
    const firebaseConfig = {
      apiKey: "AIzaSyA8LV6EQ4dxHTIIabUjiHRPFcbsvoAW6Hs",
      authDomain: "tracker-3630d.firebaseapp.com",
      projectId: "tracker-3630d",
      storageBucket: "tracker-3630d.firebasestorage.app",
      messagingSenderId: "901038407111",
      appId: "1:901038407111:web:f8479511343c5c10b4ede2",
      measurementId: "G-38YMH0TWWZ"
    };

    let app, auth, db;
    try {
      app = initializeApp(firebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
    } catch (e) {
      console.error("Gagal inisialisasi Firebase", e);
    }

    // ==========================================
    // 2. BINDERBYTE API (TRACKING)
    // ==========================================
    const COURIERS = [
      { id: 'jnt', name: 'J&T Express' },
      { id: 'jne', name: 'JNE' },
      { id: 'sicepat', name: 'SiCepat Ekspres' },
      { id: 'anteraja', name: 'AnterAja' },
      { id: 'spx', name: 'Shopee Express (SPX)' },
      { id: 'idexpress', name: 'ID Express' },
      { id: 'ninja', name: 'Ninja Xpress' }
    ];

    const BINDERBYTE_API_KEY = '6e697e720e51b107214b6fde2d467f5b7f70d644be1cb1403bcd4d9cec109ba2';

    const fetchTrackingFromAPI = async (awb, courier, itemName = '', phone = '') => {
      if (awb.length < 5) throw new Error("Nomor resi tidak valid. Minimal 5 karakter.");

      try {
        const targetUrl = `https://api.binderbyte.com/v1/track?api_key=${BINDERBYTE_API_KEY}&courier=${courier}&awb=${awb}&phone=${phone}&_t=${Date.now()}`;
        
        const proxies = [
          `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`,
          `https://api.allorigins.win/raw?url=${encodeURIComponent(targetUrl)}`,
          `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`
        ];

        let response = null;

        for (const proxyUrl of proxies) {
          try {
            const res = await fetch(proxyUrl);
            if (res.ok) {
              response = res;
              break;
            }
          } catch (proxyErr) {
            console.warn(`Proxy gagal: ${proxyUrl}`);
          }
        }
        
        if (!response) {
          throw new Error("Gagal terhubung ke server. Pastikan internet stabil atau matikan sementara AdBlocker Anda.");
        }

        const result = await response.json();

        if (result.status !== 200) {
          throw new Error(result.message || "Gagal melacak paket. Periksa kembali resi dan kurir Anda.");
        }

        const data = result.data;
        
        let mappedStatus = 'TRANSIT';
        const rawStatus = (data.summary.status || '').toUpperCase();
        if (rawStatus.includes('DELIVERED') || rawStatus.includes('SUCCESS')) mappedStatus = 'DELIVERED';
        else if (rawStatus.includes('DELIVERING') || rawStatus.includes('WITH DELIVERY COURIER')) mappedStatus = 'DELIVERING';
        else if (rawStatus.includes('PICKUP')) mappedStatus = 'PICKUP';
        else if (rawStatus === '') mappedStatus = 'PENDING';

        const timeline = (data.history || []).map((h, i) => ({
          id: i.toString() + h.date,
          description: h.desc,
          location: h.location || '',
          timestamp: h.date,
        }));

        return {
          awb: data.summary.awb,
          courier,
          itemName,
          phone,
          status: mappedStatus,
          timeline,
          addedAt: new Date().toISOString(),
          lastUpdated: new Date().toISOString()
        };

      } catch (err) {
        throw new Error(err.message || "Terjadi kesalahan jaringan.");
      }
    };

    // ==========================================
    // 3. UI COMPONENTS
    // ==========================================
    const getStatusConfig = (status) => {
      const configs = {
        'DELIVERED': { color: 'bg-black text-white border-black', icon: CheckCircle, label: 'Tiba' },
        'DELIVERING': { color: 'bg-gray-800 text-white border-gray-800', icon: Navigation, label: 'Out for delivery' },
        'TRANSIT': { color: 'bg-gray-600 text-white border-gray-600', icon: Truck, label: 'Transit' },
        'PICKUP': { color: 'bg-gray-200 text-gray-800 border-gray-300', icon: Package, label: 'Picked up' },
        'PENDING': { color: 'bg-white text-gray-600 border-gray-200', icon: Clock, label: 'Pending' },
      };
      return configs[status] || configs['PENDING'];
    };

    const StatusBadge = ({ status }) => {
      const config = getStatusConfig(status);
      const Icon = config.icon;

      return (
        <span className={`flex items-center justify-center gap-0.5 px-1 py-0.5 rounded-full text-[8px] sm:text-[9px] font-medium border ${config.color} tracking-tight w-full shadow-sm`}>
          <Icon size={9} strokeWidth={2.5} className="shrink-0" />
          <span className="truncate leading-none pt-[1px]">{config.label}</span>
        </span>
      );
    };

    // Fungsi untuk mendapatkan gaya Avatar Kurir
    const getCourierStyle = (courierId) => {
      const labels = {
        'spx': 'SPX',
        'jnt': 'J&T',
        'sicepat': 'SiCepat',
        'anteraja': 'AnterAja',
        'idexpress': 'ID',
        'ninja': 'NIN',
        'jne': 'JNE'
      };

      return {
        className: `w-full py-1.5 px-1 rounded-lg bg-black text-white flex items-center justify-center font-black text-[10px] sm:text-xs shadow-sm tracking-tight leading-none`,
        label: labels[courierId] || 'PKG'
      };
    };

    const PackageCapsule = ({ pkg, onRemove, onRefresh }) => {
      const [expanded, setExpanded] = useState(false);
      const [isRefreshing, setIsRefreshing] = useState(false);
      
      const latestEvent = pkg.timeline[0];
      const courierAvatar = getCourierStyle(pkg.courier);
      const courierNameFull = COURIERS.find(c => c.id === pkg.courier)?.name || pkg.courier;

      const statusConfig = getStatusConfig(pkg.status);
      const StatusIcon = statusConfig.icon;

      // Mendapatkan tanggal dari event paling awal (paling lama) di timeline
      const firstEventDate = pkg.timeline && pkg.timeline.length > 0 
        ? pkg.timeline[pkg.timeline.length - 1].timestamp 
        : pkg.addedAt;

      const handleRefresh = async (e) => {
        e.stopPropagation();
        setIsRefreshing(true);
        await onRefresh(pkg.awb, pkg.courier, pkg.itemName, pkg.phone);
        setIsRefreshing(false);
      };

      const formatDate = (dateString) => {
        if (!dateString) return '-';
        const d = new Date(dateString.replace(' ', 'T')); 
        if (isNaN(d.getTime())) return dateString;
        return new Intl.DateTimeFormat('id-ID', {
          day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
        }).format(d);
      };

      // Fallback name jika Nama Barang kosong
      const displayTitle = pkg.itemName ? pkg.itemName : `Paket ${courierAvatar.label}`;

      return (
        <div className="bg-white rounded-[24px] shadow-sm border border-gray-100 overflow-hidden transition-all hover:shadow-md mb-3">
          
          {/* Main Capsule Header */}
          <div 
            className="px-3 py-2.5 sm:px-4 sm:py-3 cursor-pointer flex flex-row items-stretch justify-between gap-3"
            onClick={() => setExpanded(!expanded)}
          >
            {/* Left Column: Avatar + Badge */}
            <div className="flex flex-col items-stretch justify-center gap-1 shrink-0 w-[60px] sm:w-[68px]">
              <div className={courierAvatar.className}>
                <span className="truncate">{courierAvatar.label}</span>
              </div>
              <StatusBadge status={pkg.status} />
            </div>

            {/* Middle Column: Text Information */}
            <div className="flex-1 min-w-0 flex flex-col justify-center">
              <span className="text-[8px] sm:text-[9px] text-gray-400 font-medium mb-0.5 tracking-wider uppercase">
                {formatDate(firstEventDate)}
              </span>
              <h3 className="font-black text-gray-900 text-sm sm:text-base leading-tight break-words whitespace-normal mb-1">
                {displayTitle}
              </h3>
              <p className="text-xs text-gray-600 line-clamp-2 leading-snug font-medium">
                {latestEvent?.description}
              </p>
            </div>

            {/* Right Column: Stacked Action Buttons */}
            <div className="flex flex-col items-center justify-center border-l border-gray-100 pl-2 sm:pl-3 shrink-0">
              <div className="flex flex-col gap-1">
                <button 
                  onClick={handleRefresh}
                  disabled={isRefreshing || pkg.status === 'DELIVERED'}
                  className={`p-1.5 rounded-xl transition-colors ${pkg.status === 'DELIVERED' ? 'opacity-30 cursor-not-allowed text-gray-400' : 'text-gray-900 hover:bg-gray-100'}`}
                  title="Refresh Status"
                >
                  <RefreshCw size={16} className={isRefreshing ? 'animate-spin' : ''} />
                </button>
                <button 
                  onClick={(e) => { e.stopPropagation(); onRemove(pkg.awb); }}
                  className="p-1.5 rounded-xl text-gray-900 hover:text-white hover:bg-black transition-colors"
                  title="Hapus Resi"
                >
                  <Trash2 size={16} />
                </button>
              </div>
            </div>
          </div>

          {/* Expanded Timeline & Details */}
          {expanded && (
            <div className="bg-gray-50 p-4 sm:p-5 border-t border-gray-100">
              
              {/* Hidden AWB Details */}
              <div className="mb-5 bg-white p-3 rounded-xl border border-gray-200 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-2">
                <div>
                  <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0.5">Nomor Resi</p>
                  <p className="font-mono text-sm font-bold text-gray-900">{pkg.awb}</p>
                </div>
                <div className="sm:text-right">
                  <p className="text-xs text-gray-500 font-semibold uppercase tracking-wider mb-0.5">Kurir</p>
                  <p className="text-sm font-bold text-gray-900">{courierNameFull}</p>
                </div>
              </div>

              <h4 className="text-xs font-bold text-gray-400 mb-4 tracking-wider uppercase">Riwayat Perjalanan</h4>
              <div className="relative border-l-2 border-gray-200 ml-3 space-y-6 pb-2">
                {pkg.timeline.map((event, index) => (
                  <div key={event.id} className="relative pl-6">
                    <div className={`absolute -left-[9px] top-1 h-4 w-4 rounded-full border-2 border-gray-50 ${index === 0 ? 'bg-black ring-4 ring-gray-200' : 'bg-gray-300'}`}></div>
                    
                    <div className="flex flex-col sm:flex-row sm:justify-between sm:items-start gap-1.5">
                      <div className="pr-4">
                        <p className={`text-sm leading-relaxed ${index === 0 ? 'font-bold text-gray-900' : 'text-gray-600 font-medium'}`}>
                          {event.description}
                        </p>
                        {event.location && (
                          <p className="text-xs font-bold text-black mt-1 flex items-center gap-1">
                            <MapPin size={12} /> {event.location}
                          </p>
                        )}
                      </div>
                      <span className="text-[11px] font-semibold text-gray-400 whitespace-nowrap mt-1 sm:mt-0">
                        {formatDate(event.timestamp)}
                      </span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    };

    // ==========================================
    // 4. MAIN APP COMPONENT
    // ==========================================
    function App() {
      const [packages, setPackages] = useState([]);
      const [inputValue, setInputValue] = useState('');
      const [itemName, setItemName] = useState('');
      const [phone, setPhone] = useState('');
      const [selectedCourier, setSelectedCourier] = useState(COURIERS[0].id);
      const [isLoading, setIsLoading] = useState(false);
      const [error, setError] = useState('');
      const [user, setUser] = useState(null);
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isJneModalOpen, setIsJneModalOpen] = useState(false);
      const [jneError, setJneError] = useState('');
      
      // New State for Search, Sort, and Delete Confirmation
      const [searchQuery, setSearchQuery] = useState('');
      const [sortBy, setSortBy] = useState('newest');
      const [packageToDelete, setPackageToDelete] = useState(null);
      const [isSearchActive, setIsSearchActive] = useState(false);

      // Firebase Auth
      useEffect(() => {
        if (!auth) return;
        const initAuth = async () => {
          try {
            await signInAnonymously(auth);
          } catch (e) { console.error("Auth init error:", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, setUser);
        return () => unsubscribe();
      }, []);

      // Load & Sync from Firestore
      useEffect(() => {
        if (!user || !db) return;
        const publicDataRef = collection(db, 'tracked_packages');
        
        const unsubscribe = onSnapshot(publicDataRef, (snapshot) => {
          const pkgs = [];
          snapshot.forEach(doc => pkgs.push(doc.data()));
          pkgs.sort((a, b) => new Date(b.addedAt) - new Date(a.addedAt));
          setPackages(pkgs);
        }, (error) => {
          console.error("Snapshot error:", error);
        });

        return () => unsubscribe();
      }, [user]);

      const performTracking = async (awbToTrack, courierToTrack, itemNameToTrack, phoneToTrack) => {
        setIsLoading(true);
        setError('');
        setJneError('');

        try {
          const newData = await fetchTrackingFromAPI(awbToTrack, courierToTrack, itemNameToTrack, phoneToTrack);
          const docRef = doc(db, 'tracked_packages', newData.awb);
          await setDoc(docRef, newData);
          
          setInputValue('');
          setItemName('');
          setPhone('');
          setIsModalOpen(false);
          setIsJneModalOpen(false);
        } catch (err) {
          if (isJneModalOpen) setJneError(err.message || 'Gagal melacak resi. Silakan coba lagi.');
          else setError(err.message || 'Gagal melacak resi. Silakan coba lagi.');
        } finally {
          setIsLoading(false);
        }
      };

      const handleAddPackage = async (e) => {
        e.preventDefault();
        if (!inputValue.trim() || !user || !db) return;

        if (packages.some(p => p.awb.toLowerCase() === inputValue.toLowerCase())) {
          setError('Nomor resi ini sudah ada di daftar pantauan Anda.');
          return;
        }

        if (selectedCourier === 'jne') {
          setIsModalOpen(false);
          setIsJneModalOpen(true);
          return;
        }

        await performTracking(inputValue.trim().toUpperCase(), selectedCourier, itemName.trim(), '');
      };

      const handleJneSubmit = async (e) => {
        e.preventDefault();
        if (!phone.trim()) {
          setJneError('Digit No. HP wajib diisi untuk JNE.');
          return;
        }
        await performTracking(inputValue.trim().toUpperCase(), 'jne', itemName.trim(), phone.trim());
      };

      const requestRemovePackage = (awb) => {
        setPackageToDelete(awb);
      };

      const confirmRemovePackage = async () => {
        if (!user || !db || !packageToDelete) return;
        try {
          await deleteDoc(doc(db, 'tracked_packages', packageToDelete));
          setPackageToDelete(null);
        } catch (err) {
          console.error("Failed to remove package", err);
        }
      };

      const handleRefreshPackage = async (awb, courier, itemName, pkgPhone) => {
        if (!user || !db) return;
        try {
          const updatedData = await fetchTrackingFromAPI(awb, courier, itemName, pkgPhone);
          await updateDoc(doc(db, 'tracked_packages', awb), updatedData);
        } catch (err) {
          console.error("Failed to refresh", err);
          alert(err.message);
        }
      };

      // Filter and Sort Packages Logic
      const filteredAndSortedPackages = packages
        .filter(pkg => {
          const query = searchQuery.toLowerCase();
          return (
            pkg.awb.toLowerCase().includes(query) ||
            (pkg.itemName && pkg.itemName.toLowerCase().includes(query)) ||
            (pkg.courier && pkg.courier.toLowerCase().includes(query))
          );
        })
        .sort((a, b) => {
          if (sortBy === 'newest') return new Date(b.addedAt) - new Date(a.addedAt);
          if (sortBy === 'oldest') return new Date(a.addedAt) - new Date(b.addedAt);
          if (sortBy === 'status') {
            const statusOrder = { 'PENDING': 1, 'PICKUP': 2, 'TRANSIT': 3, 'DELIVERING': 4, 'DELIVERED': 5 };
            return (statusOrder[a.status] || 99) - (statusOrder[b.status] || 99);
          }
          return 0;
        });

      return (
        <div className="min-h-screen text-gray-800 font-sans p-3 sm:p-8 relative pb-20">
          <div className="max-w-2xl mx-auto">
            
            {/* Header */}
            <div className="text-center mb-8 mt-6 sm:mt-8">
              <h1 className="text-5xl sm:text-6xl text-gray-900 mb-1 tracking-wide" style={{ fontFamily: "'Bebas Neue', sans-serif" }}>
                YEN BANGUNAN
              </h1>
              <p className="text-gray-500 uppercase tracking-[0.2em] text-[10px] sm:text-xs font-bold">
                Tracker Pesanan Online
              </p>
            </div>

            {/* Tracker List Section */}
            <div className="space-y-4">
              <div className="flex items-center justify-between mb-4 px-1 h-11 sm:h-12">
                
                {/* Bagian Kiri: Judul ATAU Search Bar Aktif */}
                {isSearchActive ? (
                  <div className="flex-1 relative flex items-center h-full transition-all animate-in fade-in slide-in-from-left-4 duration-200 mr-2">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-gray-400">
                      <Search size={18} />
                    </div>
                    <input
                      type="text"
                      autoFocus
                      placeholder="Cari resi, nama, kurir..."
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full pl-10 pr-10 py-0 h-full bg-white border border-gray-200 rounded-2xl focus:ring-2 focus:ring-black focus:border-black transition-all outline-none text-gray-900 font-medium text-sm shadow-sm"
                    />
                    <button
                      onClick={() => { setIsSearchActive(false); setSearchQuery(''); }}
                      className="absolute inset-y-0 right-0 pr-3.5 flex items-center text-gray-400 hover:text-gray-900 transition-colors"
                    >
                      <X size={18} />
                    </button>
                  </div>
                ) : (
                  <h2 className="text-xl sm:text-2xl font-black text-gray-900 tracking-tight flex items-center gap-2 animate-in fade-in slide-in-from-right-4 duration-200">
                    Pantauan Aktif 
                    <span className="bg-gray-200 text-gray-600 px-2.5 py-0.5 rounded-full text-sm font-bold">
                      {packages.length}
                    </span>
                  </h2>
                )}

                {/* Bagian Kanan: Deretan Tombol Ikon [Search] [Sort] [+] */}
                <div className="flex items-center gap-2 shrink-0">
                  
                  {!isSearchActive && packages.length > 0 && (
                    <button 
                      onClick={() => setIsSearchActive(true)}
                      className="h-11 w-11 sm:h-12 sm:w-12 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm hover:bg-gray-50 transition-colors"
                      title="Cari Resi"
                    >
                      <Search size={20} />
                    </button>
                  )}

                  {packages.length > 0 && (
                    <div className="relative">
                      <button 
                        className="h-11 w-11 sm:h-12 sm:w-12 bg-white border border-gray-200 rounded-2xl flex items-center justify-center text-gray-700 shadow-sm hover:bg-gray-50 transition-colors"
                        title="Urutkan"
                      >
                        <Filter size={20} />
                        {/* Indikator Titik Merah jika Filter aktif (bukan Terbaru) */}
                        {sortBy !== 'newest' && <div className="absolute top-2.5 right-2.5 h-2 w-2 rounded-full bg-red-500 border border-white"></div>}
                      </button>
                      <select
                        value={sortBy}
                        onChange={(e) => setSortBy(e.target.value)}
                        className="absolute inset-0 w-full h-full opacity-0 cursor-pointer"
                      >
                        <option value="newest">Terbaru</option>
                        <option value="oldest">Terlama</option>
                        <option value="status">Status Pengiriman</option>
                      </select>
                    </div>
                  )}

                  <button 
                    onClick={() => setIsModalOpen(true)}
                    className="bg-black hover:bg-gray-800 text-white h-11 w-11 sm:h-12 sm:w-12 rounded-2xl flex items-center justify-center transition-transform active:scale-95 shadow-md shrink-0"
                    title="Tambah Resi Baru"
                  >
                    <Plus size={24} strokeWidth={3} />
                  </button>
                </div>
              </div>

              {filteredAndSortedPackages.length === 0 ? (
                <div className="text-center py-20 bg-white border-2 border-dashed border-gray-200 rounded-[32px]">
                  <div className="inline-flex items-center justify-center h-16 w-16 rounded-full bg-gray-50 mb-4">
                    <Package size={28} className="text-gray-300" />
                  </div>
                  <p className="text-gray-500 font-semibold mb-2">
                    {packages.length === 0 ? "Belum ada paket yang dilacak." : "Paket tidak ditemukan."}
                  </p>
                  {packages.length === 0 && (
                    <button onClick={() => setIsModalOpen(true)} className="text-black font-black text-sm hover:underline">
                      Tekan tombol + untuk menambah
                    </button>
                  )}
                </div>
              ) : (
                <div className="space-y-4">
                  {filteredAndSortedPackages.map(pkg => (
                    <PackageCapsule 
                      key={pkg.awb} 
                      pkg={pkg} 
                      onRemove={requestRemovePackage}
                      onRefresh={handleRefreshPackage}
                    />
                  ))}
                </div>
              )}
            </div>
            
            <div className="mt-12 text-center text-[10px] text-gray-400 font-medium">
              <p>Dibuat oleh Fajar Jayadi</p>
            </div>

          </div>

          {/* MAIN ADD PACKAGE MODAL */}
          {isModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4">
              <div className="bg-white rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-lg overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300">
                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                  <h3 className="font-black text-xl text-gray-900 tracking-tight">Lacak Resi Baru</h3>
                  <button onClick={() => setIsModalOpen(false)} className="p-2 -mr-2 text-gray-400 hover:text-black hover:bg-gray-100 rounded-full transition-colors bg-gray-50">
                    <X size={20} strokeWidth={3} />
                  </button>
                </div>
                
                <div className="p-6">
                  <form onSubmit={handleAddPackage} className="flex flex-col gap-5">
                    
                    <div className="space-y-5">
                      <div className="relative">
                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nomor Resi</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <Search size={20} />
                          </div>
                          <input
                            type="text"
                            value={inputValue}
                            onChange={(e) => setInputValue(e.target.value)}
                            placeholder="Contoh: JP8391283..."
                            className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:bg-white focus:ring-2 focus:ring-black focus:border-black transition-all outline-none text-gray-900 placeholder-gray-400 font-mono font-bold text-sm sm:text-base"
                            required
                            autoFocus
                          />
                        </div>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Pilih Kurir</label>
                        <select
                          value={selectedCourier}
                          onChange={(e) => setSelectedCourier(e.target.value)}
                          className="w-full px-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:bg-white focus:ring-2 focus:ring-black focus:border-black transition-all outline-none text-gray-900 appearance-none cursor-pointer font-bold text-sm sm:text-base"
                          style={{ backgroundImage: `url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%23000' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M6 8l4 4 4-4'/%3e%3c/svg%3e")`, backgroundPosition: 'right 1rem center', backgroundRepeat: 'no-repeat', backgroundSize: '1.2em 1.2em' }}
                        >
                          {COURIERS.map(c => (
                            <option key={c.id} value={c.id}>{c.name}</option>
                          ))}
                        </select>
                      </div>

                      <div>
                        <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Nama Barang (Opsional)</label>
                        <div className="relative">
                          <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400">
                            <Package size={20} />
                          </div>
                          <input
                            type="text"
                            value={itemName}
                            onChange={(e) => setItemName(e.target.value)}
                            placeholder="Contoh: Sepatu Sneakers"
                            className="w-full pl-12 pr-4 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:bg-white focus:ring-2 focus:ring-black focus:border-black transition-all outline-none text-gray-900 placeholder-gray-400 font-bold text-sm sm:text-base"
                          />
                        </div>
                      </div>
                    </div>

                    {error && (
                      <div className="flex items-start gap-2 text-red-600 bg-red-50 p-4 rounded-2xl text-sm border border-red-100 font-medium">
                        <AlertCircle size={18} className="shrink-0 mt-0.5" />
                        {error}
                      </div>
                    )}

                    <div className="pt-2 mt-2">
                      <button
                        type="submit"
                        disabled={isLoading || !user}
                        className={`w-full py-4 rounded-2xl font-black text-white transition-all transform active:scale-[0.98] shadow-lg ${
                          isLoading || !user ? 'bg-gray-400 shadow-none' : 'bg-black hover:bg-gray-800 hover:shadow-xl'
                        } flex items-center justify-center gap-2 text-base`}
                      >
                        {isLoading ? (
                          <>
                            <RefreshCw size={20} className="animate-spin" />
                            Mencari Data...
                          </>
                        ) : (
                          <>
                            Lacak Sekarang
                            <Truck size={20} />
                          </>
                        )}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* JNE VERIFICATION MODAL */}
          {isJneModalOpen && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4">
              <div className="bg-white rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-md overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300">
                <div className="px-6 py-5 border-b border-gray-100 flex justify-between items-center bg-white">
                  <h3 className="font-black text-xl text-gray-900 tracking-tight">Verifikasi JNE</h3>
                  <button onClick={() => { setIsJneModalOpen(false); setJneError(''); }} className="p-2 -mr-2 text-gray-400 hover:text-black hover:bg-gray-100 rounded-full transition-colors bg-gray-50">
                    <X size={20} strokeWidth={3} />
                  </button>
                </div>
                
                <div className="p-6">
                  <div className="bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-6">
                    <p className="text-sm text-blue-900 font-medium leading-relaxed">
                      Kurir JNE mewajibkan verifikasi demi keamanan. Masukkan <strong>4 - 5 digit terakhir</strong> dari nomor HP si penerima paket.
                    </p>
                  </div>
                  
                  <form onSubmit={handleJneSubmit} className="flex flex-col gap-5">
                    <div>
                      <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2 ml-1">Digit Terakhir HP Penerima</label>
                      <input
                        type="number"
                        value={phone}
                        onChange={(e) => setPhone(e.target.value)}
                        placeholder="Contoh: 8989"
                        className="w-full px-5 py-4 bg-gray-50 border border-gray-200 rounded-2xl focus:bg-white focus:ring-2 focus:ring-black focus:border-black transition-all outline-none text-gray-900 placeholder-gray-400 font-mono font-bold text-lg text-center tracking-widest"
                        required
                        autoFocus
                      />
                    </div>

                    {jneError && (
                      <div className="flex items-start gap-2 text-red-600 bg-red-50 p-4 rounded-2xl text-sm border border-red-100 font-medium">
                        <AlertCircle size={18} className="shrink-0 mt-0.5" />
                        {jneError}
                      </div>
                    )}

                    <div className="pt-2 flex gap-3">
                      <button
                        type="button"
                        onClick={() => {
                          setIsJneModalOpen(false);
                          setIsModalOpen(true);
                          setJneError('');
                        }}
                        className="flex-1 py-4 rounded-2xl font-black text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors"
                      >
                        Kembali
                      </button>
                      <button
                        type="submit"
                        disabled={isLoading || !user}
                        className={`flex-[1.5] py-4 rounded-2xl font-black text-white transition-all transform active:scale-[0.98] ${
                          isLoading || !user ? 'bg-gray-400' : 'bg-[#004A98] hover:bg-blue-900 shadow-lg shadow-blue-900/20'
                        } flex items-center justify-center gap-2`}
                      >
                        {isLoading ? (
                          <RefreshCw size={20} className="animate-spin" />
                        ) : (
                          <>
                            Verifikasi <CheckCircle size={20} />
                          </>
                        )}
                      </button>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          )}

          {/* DELETE CONFIRMATION MODAL */}
          {packageToDelete && (
            <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-end sm:items-center justify-center sm:p-4">
              <div className="bg-white rounded-t-[32px] sm:rounded-[32px] shadow-2xl w-full max-w-sm overflow-hidden flex flex-col transform transition-all animate-in slide-in-from-bottom-8 sm:slide-in-from-bottom-0 sm:zoom-in-95 duration-300 p-6 text-center">
                <div className="mx-auto flex items-center justify-center h-16 w-16 rounded-full bg-red-100 mb-4">
                  <Trash2 size={28} className="text-red-600" />
                </div>
                <h3 className="text-xl font-black text-gray-900 mb-2">Hapus Resi?</h3>
                <p className="text-sm text-gray-500 mb-6 font-medium">
                  Apakah Anda yakin ingin menghapus resi <strong className="text-gray-900">{packageToDelete}</strong> dari pantauan?
                </p>
                <div className="flex gap-3">
                  <button
                    onClick={() => setPackageToDelete(null)}
                    className="flex-1 py-3.5 rounded-2xl font-bold text-gray-700 bg-gray-100 hover:bg-gray-200 transition-colors"
                  >
                    Batal
                  </button>
                  <button
                    onClick={confirmRemovePackage}
                    className="flex-1 py-3.5 rounded-2xl font-bold text-white bg-red-600 hover:bg-red-700 transition-colors shadow-lg shadow-red-600/20"
                  >
                    Ya, Hapus
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    // Render App
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
